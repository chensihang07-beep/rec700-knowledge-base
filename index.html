23, pp.6–7)"}, {"text": "Non-performativity (Ahmed, 2006): a policy is effective precisely because it does not produce the change it nominally supports; it substitutes the illusion of action for action itself. The existence of declarations conceals inequality — institutions treat acknowledging the problem as having fixed it.", "src": "Ahmed (2006), cited in Bailey et al. (2023, p.8)"}, {"text": "The politics of rest: rest is also racialised/ability-ised/body-sized — who is allowed to rest, who gets labelled as lazy. The colonisation of Western yoga; stillness/meditation commercialised as quick fixes to boost productivity — this is itself the logic of ableism-capitalism.", "src": "Bailey et al. (2023, pp.11–12)"}]}, {"id": 24, "author": "Halberstam, J.", "year": "2005", "title": "In a Queer Time and Place: Transgender Bodies, Subcultural Lives [Ch. 1]. NYU Press.", "themes": ["queer"], "summary": "提出酷儿时间性（queer temporality）和酷儿地理（queer geographies）的概念框架。反对家庭/异性恋/再生产时间规训——拆解三重异性恋时间：Repro-time（生物钟/中产体面规训）/Family time（育儿日常规范作息）/Inheritance time（代际价值/财富传承）。Queer time：离开资产阶级再生产时间框架后出现的特定时间模型。AIDS危机的时间压缩与当下性。Metronormativity批判：酷儿不等于城市化。", "keyArgs": [{"term": "三重异性恋规训时间", "exp": "Repro-time：女性生物钟+中产体面规训/夫妻作息安排；Family time：育儿的日常规范作息表；Inheritance time：代际价值/财富/物品/道德的传承。这三重时间共同构成异性恋-资产阶级秩序的自然化机制，把正常人生表与国家/家庭稳定/风险治理打包成一个自然的安排。"}, {"term": "Queer time", "exp": "AIDS危机创造了压缩的时间性：不断收缩的未来迫使注意力转向此时此刻，把当下挤压出新的可能性。亚文化产生替代性时间，不受出生-婚姻-生育-死亡范式束缚。药物创造的游戏性时间（ludic temporality），重写快慢、稳定/爆发的道德叙事。"}, {"term": "Queer space", "exp": "酷儿参与的地方营造实践；酷儿反公共（counterpublics）生产的空间新理解。非都市酷儿的关注——质疑酷儿生活=城市的本质描述（metronormativity）。Delany的时代广场分析：所谓净化城市的背后是对跨阶级接触的恐惧。"}, {"term": "Homonormativity（Duggan, 2003）", "exp": "不挑战主导的异性恋规范与制度，反而维护它们；同时承诺一种被去动员化的同志群体，被家庭性与消费所锚定。越界例外主义：在酷儿社群里，少数人的越界被展示为进步，掩盖了整体的规范化。"}, {"term": "Identity politics的反思", "exp": "从对普遍主义的必要/策略性批判，蜕变为自我政治的狭隘困局。身份政治一词被模糊使用，成为新的本质主义标签，用以指责某些议题涉己。"}], "questions": ["Cathy Cohen 1999：有色queer、贫困者被边缘化于酷儿理论的核心叙事——如何在酷儿理论中真正处理交叉性而不将其降格为身份附加？", "性别灵活性如何避免被误读为个人主义或进步的新证据（flexible citizenship的危险）？", "公共性地下世界（Delany的时代广场）的叙事中缺少女性——queer theory的性别盲点如何修正？"], "thinkers": ["Halberstam", "Foucault", "Delany", "Harvey", "Butler", "Cohen", "Duggan", "Edelman", "Bersani"], "method": "酷儿时间性分析提供了一种不同于线性进步叙事的时间分析工具，可以用于分析边缘群体的时间经验、亚文化实践与主流时间规训的冲突。", "note": "因果不是在时间线上的——整个意识和存在是混乱的参杂体。这个想法让我重新思考研究设计中对时间的默认假设。", "related": ["Bailey et al 2023", "Changfoot et al 2022", "Berbary 2017", "hooks 1991"], "quotes": [{"text": "Three heterosexual regulatory times: Repro-time (women's biological clock + middle-class respectability discipline); Family time (daily normalised timetable of child-rearing); Inheritance time (intergenerational transmission of values/wealth/objects/morality). Together they naturalise the hetero-bourgeois order.", "src": "Halberstam (2005, pp.4–5)"}, {"text": "Queer time: the AIDS crisis created a compressed temporality — constantly shrinking futures forced attention onto the here and now, squeezing new possibilities from the present. Subcultural time, not bound by the birth–marriage–reproduction–death paradigm.", "src": "Halberstam (2005, pp.6–7)"}, {"text": "Metronormativity: queer life is not necessarily urban. Delany's Times Square analysis: the so-called 'clean city' conceals fear of cross-class contact — queer space is also a class political space.", "src": "Halberstam (2005, pp.12–13); Delany"}, {"text": "Homonormativity (Duggan, 2003): not challenging dominant heterosexual norms and institutions, but reinforcing them; promising a demobilised gay constituency anchored in domesticity and consumption — transgressive exceptionalism conceals overall normalisation.", "src": "Duggan (2003), cited in Halberstam (2005, p.9)"}]}, {"id": 25, "author": "Bennett, J.", "year": "2010", "title": "Vibrant Matter: A Political Ecology of Things [Ch. 1]. Duke University Press.", "themes": ["materialism"], "summary": "提出生机唯物主义（vital materialism）：thing-power——看似无生命之物激活、行动、产生效果的能力。通过巴尔的摩街头垃圾的偶遇（手套/花粉/老鼠/瓶盖/木棍），展示物如何从废弃物转变为具有thing-power的存在。核心本体论主张：人类自身是vibrant matter的一部分，人与非人的边界是滑动的，物质活力是连续谱而非断裂二元。", "keyArgs": [{"term": "Thing-power的概念", "exp": "看似无生命之物激活、行动、产生效果的能力——不是文化赋予的象征意义，而是物质自身的能动性。物体变成things：不再只是被人类语境完全耗尽的对象，而是带有自身能量的存在。垃圾的双重视角：作为废弃物（人类中心）vs 作为thing（本体论平等主义）。"}, {"term": "Assemblage视角", "exp": "垃圾堆为什么发光了？因为那些物件在特定时刻形成了assemblage——元素的聚合产生了超出各部分之和的效果。为什么这堆垃圾产生了美感/生命感？Gould：令人痛苦的复杂性和顽固性（excruciating complexity and intractability）。"}, {"term": "消费文化是anti-materiality的", "exp": "当代美国的物质主义实际上是anti-materiality：海量商品+快速抛弃，遮蔽了物质本身的生命力。消费文化把物质降格为一次性工具，恰恰是对物质活力的否认——这是一个吊诡的批判。"}, {"term": "有机/无机连续谱", "exp": "Deleuze/Vernadsky：植物里总有一丝动物性，动物里总有一丝植物性；生命与物质不是截然分开的，而是连续谱。DeLanda：无机物也会self-organize。Kafka的Odradek打破有机/无机二分。"}, {"term": "Adorno非同一性与物的超越", "exp": "通过不断揭示概念的不充分，强化我们对对象超出认知的感受。放弃对世界彻底掌控的欲望。物总有超出我们认知和文化框架的部分，这个超出本身是政治的——迫使我们重新考虑控制欲。"}], "questions": ["Thing-power会不会只是我们给物体加上的文化意义？Bennett如何区分她自己的文化投射和物的真实能动性？", "如果抹平人/物边界，是否会助长对人的物化？Kant的人是目的本身是否在历史上有效地阻止了人类互相残酷对待？", "进化论中的适应（adaptation）是否可以重写为assemblage的稳定？社会看成多层进化的物质网络这个框架是否有研究价值？"], "thinkers": ["Bennett", "Latour", "DeLanda", "Vernadsky", "Deleuze", "Guattari", "Adorno", "Lucretius", "Spinoza", "Kafka"], "method": "振动物质论提供了一种不同的研究本体论：不只关注话语/文化的建构，同时关注物质自身的能动性。在旅游/休闲研究中，这意味着：场所/物件/身体不只是意义的载体，也是能动的行动者。", "note": "读完后竟然不感到奇怪或质疑，有一种冥冥之中世界本来就是如此的感觉——我不知道这种想法是什么，但它很真实。", "related": ["Rosiek et al 2020", "Stinson et al 2022", "Hockert 2020", "Moran 2000"], "quotes": [{"text": "Thing-power: the capacity of seemingly inanimate things to activate, act, and produce effects — not symbolic meaning conferred by culture, but the agency of matter itself. Objects become things: no longer only exhausted by human contexts, but beings with their own energy.", "src": "Bennett (2010, pp.2–3)"}, {"text": "Assemblage perspective: why does the garbage heap glow? Because those objects at that particular moment formed an assemblage — the aggregation of elements produced an effect exceeding the sum of its parts. Gould: excruciating complexity and intractability.", "src": "Bennett (2010, p.4)"}, {"text": "Contemporary 'materialism' is actually anti-materiality: vast commodities + rapid disposal conceals the vitality of matter itself. Consumer culture degrades matter to disposable tools — a paradoxical critique of consumer materialism.", "src": "Bennett (2010, pp.12–13)"}, {"text": "Deleuze/Vernadsky: there is always a trace of animality in plants, a trace of plant-nature in animals — life and matter are not sharply separated but a continuum. DeLanda: inorganic matter also self-organises. Kafka's Odradek breaks the organic/inorganic binary.", "src": "Deleuze; Vernadsky; DeLanda; Kafka, cited in Bennett (2010, pp.9–11)"}]}, {"id": 26, "author": "Rosiek, J., et al.", "year": "2020", "title": "The new materialisms and Indigenous theories of non-human agency. Qualitative Inquiry, 26(3-4).", "themes": ["materialism", "indigenous"], "summary": "质疑新唯物主义（Barad, Latour等）为何未与原住民的非人能动理论展开对话，尽管后者早已将非人能动作为分析出发点。批判Columbus发现非人能动性的表演性矛盾：一边主张反思权力，一边在引用实践上延续白人欧洲中心结构。呼吁respectful anti-colonial engagement：把原住民学者视为理论家而非田野对象。", "keyArgs": [{"term": "表演性矛盾（performative contradiction）", "exp": "新唯物主义声称反思权力与不平等，但在行动上延续白人欧洲中心的引用结构（citation structure），系统性地不引用原住民学者的作品。Columbus发现非人能动性：用新词包装已在原住民传统中存在几百年的洞见。"}, {"term": "Place-thought（Watts, 2013）", "exp": "土地是活的、有思维的。身处特定地点的过程使某种意识和视野成为可能——mind of the place。人与地方的关系是两个感知的接口，不是主体与客体的关系。地方在某种意义上通过人类作为媒介为自己发声。"}, {"term": "Grounded normativity（Coulthard）", "exp": "规范性（normative standards）来自与土地的具体关系，而非抽象的普遍原则。这是对new materialism的批判性补充：光谈非人能动还不够，需要把土地关系的伦理-政治维度纳入分析。"}, {"term": "Inclusive politics of citation", "exp": "种族主义不只是旁支原因，而是让学者不去读原住民作品的结构性机制。白人抽取原住民理论但不承担政治责任——这是认识论提取主义的学术形态。"}, {"term": "深层互惠（deep reciprocity）", "exp": "Simpson：知识获取本身要求建立深层互惠关系，不只是合作研究或参与式研究。物质性的赠与（gift of materiality）：在求知时，人已经卷入与他者的共生关系，必须付出某种代价来承认这种共生。"}], "questions": ["如何在不挪用（appropriation）的前提下，与原住民学者建立真正的对话？区分学习、借用、挪用的边界是什么？", "Barad的纠缠性（entanglement）与原住民关系性（relationality）的相似与差异：哪些是真正的共鸣，哪些是新唯物主义对原住民洞见的再包装？", "引用政治的实践：如何在自己的研究写作中实践inclusive politics of citation？"], "thinkers": ["Rosiek", "Barad", "Latour", "Watts", "Coulthard", "Simpson", "Deloria", "Todd"], "method": "在文献综述中，审查你的引用列表：有多少原住民学者？他们是作为理论家还是作为田野背景？如果比例失衡，这揭示了什么？", "note": "把藏族研究联系起来：山（ri）、湖（mtsho）、地神（sa bdag）都被当作有意志的存在——这是Place-thought在藏族宇宙观中的体现，应该被视为理论资源而非文化背景。", "related": ["Todd 2016", "Wilson 2008", "Tynan 2021", "Bennett J 2010", "Hockert 2020"], "quotes": [{"text": "Performative contradiction: new materialisms claim to reflect on power and inequality, but in practice perpetuate white Eurocentric citation structures — systematically not citing Indigenous scholars' work. Columbus discovering non-human agency: packaging already-existing Indigenous insights in new vocabulary.", "src": "Rosiek et al. (2020, pp.332–333)"}, {"text": "Place-thought (Watts, 2013): land is alive and thinking. Being in a particular place makes a certain consciousness and perspective possible — mind of the place. The relationship between person and place is an interface of two perceptions, not subject and object.", "src": "Watts (2013), cited in Rosiek et al. (2020, p.336)"}, {"text": "Grounded normativity (Coulthard): normative standards come from specific relationships with land, not abstract universal principles. This is a critical supplement to new materialism — just talking about non-human agency is not enough; the ethical-political dimensions of land relations must be incorporated.", "src": "Coulthard, cited in Rosiek et al. (2020, p.338)"}, {"text": "Inclusive politics of citation: racism is not a peripheral reason but the structural mechanism that prevents scholars from reading Indigenous works. Extracting Indigenous theory without bearing political responsibility — this is the academic form of epistemological extractivism.", "src": "Rosiek et al. (2020, pp.340–341)"}]}, {"id": 27, "author": "Todd, Z.", "year": "2016", "title": "An Indigenous Feminist's take on the ontological turn. Journal of Historical Sociology, 29(1).", "themes": ["indigenous", "poststructural"], "summary": "直接点名批评本体论转向（ontological turn）的学术实践：一边大谈去殖民/本体论自决，一边在结构上继续维持白人至上和对原住民学者的系统性抹除。提出Aer nullius（知识层面的terra nullius）：先把原住民的关系和权利从知识空间抹除，再用自己的理论填充进去。批判白人公共空间（white public space）的结构性维持。", "keyArgs": [{"term": "Aer nullius（知识的terra nullius）", "exp": "先把原住民的关系和权利从学术知识空间中抹除，然后用欧洲理论填充。这与殖民时代的terra nullius（无主之地）逻辑完全一致——先宣布原住民不存在，再占领。本体论转向在知识空间中重演殖民地理的占领逻辑。"}, {"term": "表演性矛盾的具体体现", "exp": "一边大谈本体论去殖民，一边在实际引用和会议中几乎只引用欧洲白人男性理论家。欧洲学术结构让只在欧洲内部互相引用的讲法变得自然。Location（Sundberg）：承认自身位置是去殖民本体论的第一步。"}, {"term": "Lighten up = Whiten up", "exp": "白人用放轻松来化解、抹平批判者的不适，实际是在要求批判者不要破坏白人舒适空间（white comfort space）。The revolution will be mediated——媒体化和学术化的革命如何被驯化为不伤害权力的形式。"}, {"term": "白人公共空间的结构", "exp": "Ahmed (2014)：白人男性是一个机构——持续的结构/规范/行为方式/引用方式。White fragility是这一结构的防御机制。人类学是白人公共空间（Brodkin et al.）。"}, {"term": "实践性的去殖民引用", "exp": "给出了一份原住民学者名单（Donald, Borrows, Napoleon, Audra Simpson, TallBear等），要求在研究中把原住民视为理论家，而不只是田野对象。在学院的具体实践中拆开白人至上的结构。"}], "questions": ["为何实际引用谱系仍几乎都是白人男性，即便研究者声称支持去殖民？哪些结构性机制使这种状况自我延续？", "在招聘/课程/引用/合作方式等具体学院实践中，如何一点一点把白人至上的结构拆开？哪些是可操作的第一步？", "本体论转向的理论价值是否可以在承认原住民知识先在性的前提下保留？还是说它的整个框架都需要被重新思考？"], "thinkers": ["Todd", "Holbraad", "Viveiros de Castro", "Watts", "Sundberg", "Hunt", "Donald", "Coulthard"], "method": "每次写作理论综述时，审查：我是否在Columbus式地发现原住民学者早已提出的洞见？我是否给予了原住民学者作为理论家（而非背景材料）的地位？", "note": "Oh damn, this is exactly what Nada keeps telling me. Thank god！", "related": ["Rosiek et al 2020", "Wilson 2008", "Smith 2012", "Crenshaw et al 1995", "Berbary 2017"], "quotes": [{"text": "Aer nullius: first erasing Indigenous peoples' relationships and rights from academic knowledge space, then filling it with European theory. This is exactly the same logic as terra nullius (land without people) from the colonial era — first declaring Indigenous peoples non-existent, then occupying.", "src": "Todd (2016, p.8)"}, {"text": "Lighten up = Whiten up: white people use 'relax' to defuse and flatten critics' discomfort — actually demanding that critics not disturb white comfort space. The revolution will be mediated — how a mediated and academicised revolution is domesticated into a form that does not harm power.", "src": "Todd (2016, p.11)"}, {"text": "Ahmed (2014): white male is an institution — a continuous structure/norm/behavioural mode/citation mode. White fragility is the defensive mechanism of this structure. Location (Sundberg): acknowledging one's own position is the first step in decolonial ontology.", "src": "Ahmed (2014); Sundberg, cited in Todd (2016, pp.9–10)"}, {"text": "Cite this, not that: gives a list of Indigenous scholars (Donald, Borrows, Napoleon, Audra Simpson, TallBear, etc.), requiring that Indigenous people be treated as theorists in research, not just field context. Dismantling the structure of white supremacy in the academy one concrete practice at a time.", "src": "Todd (2016, pp.14–15)"}]}, {"id": 28, "author": "Berbary, L.", "year": "2017", "title": "Thinking through post-structuralism in leisure studies. In Palgrave Handbook of Leisure Theory.", "themes": ["poststructural", "leisure"], "summary": "后结构主义对休闲研究人文主义基础的系统性扰动：人文主义的taken-for-granted（稳定主体/透明语言/线性进步/可靠真理/1:1再现逻辑）在生产不公正效应。从Foucault、Derrida、Butler到Barad，提出Palimpsest策略：一边使用这些概念，一边不断interrogate它们携带的历史与意识形态残余。Post不是时间线性意义的之后，而是一种持续的政治批判实践。", "keyArgs": [{"term": "Post的含义：永久政治批判", "exp": "不是时间线性质的在后（after），而是permanent political critique that has no end（St. Pierre, 2000）。这是一种方法论姿态：让那些被视为理所当然的东西不再理所当然（Foucault）。Post不是取代人文主义，而是持续扰动、拉伸、interrogate其taken-for-granted。"}, {"term": "清晰语言的政治警告（Lather）", "exp": "清晰的、立刻被理解的话语往往是透明能指，它们恰好是最顺畅地嵌入既有意义体制的那种语言，因此最容易加固而不是颠覆现有结构。Post-structuralism有时选择难懂：不是为了故弄玄虚，而是抗拒常识、重写语言-世界关系的政治实践。"}, {"term": "Palimpsest策略（羊皮纸策略）", "exp": "一边借用人文主义概念，一边不断interrogate它们携带的历史与意识形态残余。就像在旧羊皮纸上重新书写，原有的印记仍然可见——承认无法完全逃出人文主义，但坚持不断摩擦。Spivak：persistently critiquing a structure that one cannot not inhabit。"}, {"term": "解构不是否定（Butler）", "exp": "把一个概念打开，让它以尚未获得授权的方式再次被使用。解构leisure/work/community/disability等概念：不是取消这些概念，而是打开它们，让边缘化群体能以新的方式使用它们。这是生产性的，不是虚无的。"}, {"term": "新唯物主义的纠缠（Barad）", "exp": "Material-discursive entanglements：物质和话语不是分开的，而是相互纠缠的（entangled）。思想成为一种行动方式（Deleuze & Guattari）。没有一个超越的深层真理，所有东西都在表面纠缠。"}], "questions": ["当难懂被选择为对清晰语言/常识的抵抗时，是否排除了底层群体进入理论对话的可能？可及性与批判性之间的张力如何处理？", "解构哪些休闲研究的核心概念（work/leisure/free time/wellness/disability等）是生产性的，哪些会滑向虚无？如何判断？", "后结构主义与批判理论的关系：前者更关注语言/权力，后者更关注结构/解放。它们能否互补？"], "thinkers": ["Foucault", "Derrida", "Butler", "Barad", "Lather", "St. Pierre", "Halberstam", "Spivak", "Deleuze", "Guattari"], "method": "在休闲研究写作中，把所有核心概念（leisure, freedom, health, wellness, community）都当作需要历史化和去自然化的对象。问：这个概念如何被构建出来？它服务于谁？它排除了谁？", "note": "Every Chinese person harbors fragments of capitalism within their heart, yet lives under socialism.", "related": ["Burr 1995", "Halberstam 2005", "hooks 1991", "Todd 2016", "Bennett J 2010"], "quotes": [{"text": "Post is not a temporal 'after' but permanent political critique that has no end (St. Pierre, 2000). A methodological stance: making what is taken-for-granted no longer so (Foucault). Post does not replace humanism, but continuously disturbs, stretches, interrogates its taken-for-granted.", "src": "St. Pierre (2000); Foucault, cited in Berbary (2017, p.6)"}, {"text": "Lather — the political warning of clear language: clear, immediately understandable discourse is often the very kind most smoothly embedded in the existing meaning regime, and therefore most easily reinforces rather than subverts existing structures. Choosing difficulty is a political practice of resisting common sense.", "src": "Lather, cited in Berbary (2017, p.9)"}, {"text": "Palimpsest strategy: using humanist concepts while continuously interrogating the historical and ideological residues they carry. Like rewriting on old parchment — the original imprints still visible. Spivak: persistently critiquing a structure that one cannot not inhabit.", "src": "Spivak, cited in Berbary (2017, p.11)"}, {"text": "Butler: deconstruction is not negation — opening a concept so it can be used again in ways not yet authorised. Deconstructing leisure/work/community/disability: not cancelling these concepts but opening them so marginalised groups can use them in new ways.", "src": "Butler, cited in Berbary (2017, p.13)"}]}, {"id": 29, "author": "Berbary, L.A.", "year": "forthcoming", "title": "Infrastructure for revolutionary imagination: Radical political education, solidarity research, and the Theorypractice Lab. Unpublished draft, July 2025.", "themes": ["critical", "leisure"], "summary": "激进政治教育（radical political education）作为解放的基础设施：在社区之内/为社区/由社区。批判休闲研究中的自由主义化：福祉/包容/社会资本等话语成为去政治化和美化剥削的工具，忽视社会结构性根源。Theorypractice Lab案例：理论与实践本来一体（不是理论指导实践，而是在斗争实践中共同生产知识）。Restorative/reparative research：shared risk，而非传统合作研究的合法性背书。", "keyArgs": [{"term": "解放的基础设施", "exp": "激进政治教育不是课程内容，而是建立叛乱式（insurgent）基础设施：在社区之内/为社区/由社区。对抗被自由主义驯化的政治教育（仅停留在意识培养，不触及物质-制度改变）。以社区生存、自主掌控、激进团结为目标，而非服务于劳动力市场与学院新自由主义。"}, {"term": "休闲作为被权力纠缠的场域", "exp": "劳动/应得性/生产力的边界被政治关系模糊，不平等权力支配。自由主义的社区话语（福祉/包容/社会资本）美化并遮蔽了剥削的结构性根源。没有摆脱暴力/权力/结构压迫的休闲——这是核心批判立场。"}, {"term": "Theorypractice Lab的实践", "exp": "住房正义/反绅士化；跨越街头-学校边界；集体行动-学习-反思空间。知识不是自上而下传递，而是在斗争实践中共同生产的。激进主体：斗争、改装、破裂——不是等待被教育，而是在实践中生成批判主体性。"}, {"term": "Restorative/reparative research", "exp": "不是合作研究/参与式研究的合法性背书，而是shared risk：研究者真正卷入社区斗争，共同承担风险。如何理解修复（restorative）？再分配（reparative）？权力重组？这些都不只是话语层面的问题。"}, {"term": "命名vs介入", "exp": "命名和更改口号不等于真正的介入/组织/动员。美化和利益化剥削，遮蔽了集体学习和物质干预的政治条件基础。反叙事也在被美化——我们如何面对？"}], "questions": ["儒家规训与解放教育：中国传统中家-族-国的链条，以及差序格局和礼的规范如何内化为避让/含蓄的表达，阻碍了政治化和制度化的表述？这对激进政治教育在中国语境中意味着什么？", "如何跨越解放的第一步：浮躁与虚荣？在极度消费主义和数字化的当代环境中，解放教育的起点在哪里？", "斗争成为多元/对话/协作——是真正的策略演进还是被去激进化？如何识别两者的区别？"], "thinkers": ["Berbary", "Freire", "hooks", "Gramsci", "Marx", "Fanon", "Simpson"], "method": "批判性休闲研究需要追问：我的研究真的对社区有用吗？我是否分担了研究的风险？我的知识生产过程是否本身就是一种剥削？", "note": "反叙事在被美化中——这是一个令人不安的观察：连激进批判本身也可以被商品化、被学院消化成另一种形式的表演。", "related": ["hooks 1991", "Crotty critical 1998", "Ladson-Billings 1998", "Melamed 2015", "Bailey et al 2023"], "quotes": [{"text": "Leisure is a social field deeply entangled with power/class/ideology. Labour, deservingness, and productivity boundaries — blurred by political relations, dominated by unequal power. Fundamentally, there is no leisure freed from violence/power and structural oppression.", "src": "Berbary (forthcoming, p.4)"}, {"text": "Liberal discourses of community (well-being, inclusion, social capital) beautify and conceal the structural roots of exploitation. Insurgent infrastructure: within/for/by community. Community survival, self-determination, radical solidarity, class suicide and reparative redistribution — NOT: serving the labour market and academic neoliberalism.", "src": "Berbary (forthcoming, pp.7–8)"}, {"text": "Theorypractice Lab: housing justice and anti-gentrification; crossing the street–school boundary; collective action–learning–reflection space. Knowledge is not top-down but a collective product of struggle practice. Radical subject: struggle, reappropriation, rupture!", "src": "Berbary (forthcoming, pp.12–13)"}, {"text": "Restorative/reparative research — shared risk, not the legitimacy endorsement of cooperative/participatory research. Naming and changing slogans ≠ genuine intervention, organisation, and mobilisation. Counter-narratives are also being aestheticised — how do we face this?", "src": "Berbary (forthcoming, pp.15–16)"}]}, {"id": 30, "author": "Mock, S. E., et al.", "year": "2025", "title": "How socioeconomic status shapes the association of social leisure with well-being. Journal of Leisure Research, 56(2).", "themes": ["leisure"], "summary": "量化研究：SES（社会经济地位）通过阶层即文化的机制（个体主义/集体主义文化取向）调节社会性休闲-幸福感关系。低SES群体：相互依存/集体主义自我观→社会性休闲（有人陪）对幸福感的影响更强；高SES群体：频次与活动多样性的优势更显著。政策含义：为不同SES匹配不同干预杠杆。", "keyArgs": [{"term": "SES的三维度操作化", "exp": "客观阶层（教育/收入/职业声望）；主观阶层（自我感知排名）；阶层即情境/文化（class-as-culture）——长期情境塑造自我观：低SES→相互依存/集体主义；高SES→独立/个人主义。本文以客观阶层为主要操作化变量。"}, {"term": "社会性休闲的操作化选择", "exp": "不是社交感（feeling of being social），而是有没有人陪（presence of others）。这个操作化选择的精确性：捕捉了物理社会性；但局限：忽略了志愿服务等高社会性但非运动的休闲场景，可能低估了社会性休闲的完整面貌。"}, {"term": "调节机制：文化自我观", "exp": "集体主义自我观的人，他人评价与关系质量对生活满意影响更大；被启动互依自我的人，他人看法更能左右满意度。这提供了SES→文化自我观→社会性休闲效果的中介机制链条。"}, {"term": "与Bourdieu的对话与偏离", "exp": "传统路径（Bourdieu）：阶层→持久倾向（habitus）→实践差异；品味/审美资本/文化全能者。本文转向：从区隔/品味路径转向心理框架（文化自我观）。是否区隔路径在同一数据中检验会失灵？"}, {"term": "政策含义的差异化", "exp": "低SES：应设计社交-连结导向的项目（成组报名/家友绑定/社区式活动场景）；高SES：可同时强调频次与身体活性。两者都受益于社会性，但低SES更依赖它，因此干预杠杆不同。"}], "questions": ["低SES对社会性线索更敏感——但社交冲突/污名暴露更高的反向效应（社交压力）如何检验？这个反例能否推翻核心假设？", "若再加入多样性/广度指标，高SES的频次优势会不会其实是涉猎更广在起作用？与杂食性（omnivorousness）理论的关系？", "在更强调价值的网络社会（而非纯粹娱乐性社交）中，低SES更依赖社会连结是否会出现反向的社交压力效应？"], "thinkers": ["Mock", "Bourdieu", "Crawford", "Hofstede", "Markus", "Kitayama"], "method": "研究设计中，操作化选择（社会性=有人陪）揭示了测量决策如何塑造结论。横断面设计的局限：无法追踪阶层-文化-休闲的动态关系。考虑加入多样性测量以完善对阶层-休闲关系的理解。", "note": "", "related": ["Valtchanov & Parry", "Bailey et al 2023", "Potwarka et al 2025"], "quotes": [{"text": "SES and social class: three definitions — objective class (education, income, occupational prestige); subjective class (self-perceived ranking); class as context/culture. Class shapes self-view over the long term: low SES → interdependence/collectivism; high SES → independence/individualism.", "src": "Mock et al. (2025, pp.197–198)"}, {"text": "Operationalisation of 'social leisure': not 'social feeling', but 'having someone present'. Limitation: ignoring highly social but non-exercise leisure contexts such as volunteering — may underestimate the full picture of social leisure.", "src": "Mock et al. (2025, pp.200–201)"}, {"text": "Policy implications: low SES — design social–connection-oriented programmes (group enrolment, family–friend bonding, community-style activity settings); high SES — can simultaneously emphasise frequency and physical activity. Both benefit from sociality, but low SES is more dependent on it.", "src": "Mock et al. (2025, pp.207–208)"}, {"text": "Departing from Bourdieu's distinction/taste path toward a psychological framework (cultural self-view). Does this mean the distinction/taste path would fail in the same data, or only that the present study did not measure it?", "src": "Mock et al. (2025); 笔记整理"}]}, {"id": 31, "author": "Potwarka, L.R., et al.", "year": "2025", "title": "Understanding the sport viewership experience using fNIRS. Scientific Reports, 15, 13374.", "themes": ["leisure", "neuro"], "summary": "运用fNIRS（功能近红外光谱）测量运动观看体验，提供在场/连续/生态有效的神经指标窗口，弥补传统自陈量表的局限：回溯偏差（retrospective bias）和潜意识加工（subconscious processing）难以捕捉。运动消费研究中的方法论创新：神经科学工具与社会科学理论（ego involvement）的结合。", "keyArgs": [{"term": "fNIRS的方法论优势", "exp": "与fMRI相比，fNIRS对运动更宽容，可以在接近真实运动观看环境下使用（生态有效性）；提供连续的、时间精确的神经活动记录；揭示何时观众最投入——而非只报告整体满意度。"}, {"term": "神经测量vs自陈量表的层次关系", "exp": "传统自陈量表易受：社会期望偏差；回溯性记忆偏差；无法捕捉无意识的情感/认知加工。fNIRS作为补充（而非替代）：提供皮层活动的直接测量，揭示意识层面难以报告的加工过程。"}, {"term": "Ego involvement的操作化", "exp": "对某项活动/事件/产品的动机状态与重要性感知，与身份核心性相关，且在运动消费研究中与忠诚/重复购买/满意等有关联。如何通过神经指标捕捉ego involvement的激活程度？"}, {"term": "生态有效性的挑战", "exp": "在真实体育现场实现fNIRS测量有多重挑战：环境噪音/运动伪影/设备可穿戴性/参与者舒适度。这些挑战限制了生态有效性的真正实现，需要在方法上继续改进。"}], "questions": ["神经指标与主观报告的层次关系：谁更真实？fNIRS测量的皮层激活与当事人主观感受的意义是否同一？", "如何将神经数据整合入社会科学的意义生产框架？神经指标能告诉我们关于社会意义的什么，以及什么不能告诉？", "从神经科学到社会政策：fNIRS数据如何转化为运动营销或休闲干预的设计原则？"], "thinkers": ["Potwarka", "Funk", "James"], "method": "神经科学方法为休闲研究提供了新的测量维度。在方法论设计中，思考：何时自陈量表足够？何时需要神经/生理测量补充？两种数据如何整合？", "note": "", "related": ["Mock et al 2025", "Valtchanov & Parry"], "quotes": [{"text": "Traditional self-report scales are subject to retrospective bias and cannot capture unconscious processing; neural indicators can fill this gap, and can reveal 'when' audiences are most engaged — not just reporting overall satisfaction.", "src": "Potwarka et al. (2025, p.2)"}, {"text": "Ego involvement: the motivational state and importance perception toward an activity/event/product, often related to identity centrality, and associated with loyalty, repeat purchase, and satisfaction in sport consumption research.", "src": "Potwarka et al. (2025, p.3)"}, {"text": "fNIRS as supplement (not replacement): provides direct measurement of cortical activity, revealing processing that is difficult to report at the conscious level. Ecological validity challenges: environmental noise, movement artefacts, wearability.", "src": "Potwarka et al. (2025, pp.5–6)"}]}, {"id": 32, "author": "Stinson, M.J., et al.", "year": "2022", "title": "Tracing the materiality of reconciliation in tourism. Annals of Tourism Research, 94.", "themes": ["tourism", "materialism"], "summary": "运用Actor-Network Theory（ANT）+关系性问责（relational accountability）框架，追踪旅游中和解（reconciliation）的物质性。通过Eastern white pine（安大略省东部白松）和图腾柱这两个物质-话语对象的分析，探讨它们如何参与构建和解叙事。批判认证的和解景观（certified reconciliation landscapes）：仅停留象征层面，不触及土地归还和权力重组。", "keyArgs": [{"term": "ANT作为方法与殖民风险", "exp": "ANT（Latour）：行动力在网络中分布，人与非人都是actant。但使用ANT本身就可能卷入殖民知识体系（批判one-world metaphysics）。研究需要承认ANT的部分性，并以原住民关系性问责来补充/修正。"}, {"term": "物件作为关系结点", "exp": "物件=关系结点+记忆装置+未来导向。和解的物质性意味着：物件不只是和解的象征，而是和解实践的能动参与者。Cameron：故事不只是反映现实，而是构成现实的物质-关系实践。"}, {"term": "白松的殖民叙事与收回", "exp": "The tree Ontario was built on：白松与殖民工业/国家建构纠缠，体现扰动/损毁/再生的历史。收回（reclamation）：把被砍的树收回来，赋予它新的物质-象征意义，将其转化为和解与新生长的象征。"}, {"term": "图腾柱的真实性问题", "exp": "某些原住民艺术形式被泛化为通用加拿大原住民象征，地理迁移使其失去具体文化语境。真实性应被理解为关系性的/不断生成的实践，而非对过去静态状态的再现——这是关键的概念转换。"}, {"term": "和解已死的批判与回应", "exp": "Campbell：和解已死。回应：不能由定居者来宣判和解是否已死。承认结构层面的失败与虚伪，但不接受以此为定居者摆烂的借口。becoming otherwise：成为承担责任的不同主体。"}], "questions": ["费孝通的差序格局与原住民关系圈层有何结构性对比？两者能否对话？", "如何设计田野问题来捕捉人们划分自己人/外人（insider/outsider）的方式，以及这种划分如何随情境变化？", "和解在旅游语境中是否不可避免地被商品化？有没有抵抗商品化的案例？"], "thinkers": ["Stinson", "Latour", "Cameron", "Coulthard", "Wilson", "Wolfe"], "method": "物质-话语分析框架：追踪物件在关系网络中如何聚合意义，同时保持对研究者自身殖民性位置的批判性意识。", "note": "费孝通《乡土中国》：差序格局的熟人社会与原住民关系本体论——两者都强调关系优先，但出发点不同（自我中心的扩展 vs 宇宙/土地中心的关系）。", "related": ["Bennett J 2010", "Bigby et al 2022", "Agbo & Grimwood 2024", "King et al 2023", "Rosiek et al 2020"], "quotes": [{"text": "ANT (Latour): agency is distributed in networks, both human and non-human are actants. But using ANT itself may be entangled in colonial knowledge systems (critique of one-world metaphysics). Research needs to acknowledge ANT's partiality and supplement/correct it with Indigenous relational accountability.", "src": "Latour; Østmo & Law, cited in Stinson et al. (2022, p.4)"}, {"text": "Objects = relational nodes + memory devices + future orientation. The materiality of reconciliation means: objects are not merely symbols of reconciliation but active participants in reconciliation practice. Cameron: stories don't just reflect reality but constitute it as material-relational practice.", "src": "Cameron, cited in Stinson et al. (2022, p.7)"}, {"text": "Campbell: reconciliation is dead. Response: settlers cannot adjudicate whether reconciliation is dead. Acknowledging structural failure and hypocrisy, but not accepting this as an excuse for settler inaction. Becoming otherwise: becoming different subjects who bear responsibility.", "src": "Campbell; cited in Stinson et al. (2022, pp.12–13)"}]}, {"id": 33, "author": "Agbo, M. & Grimwood, B.S.R.", "year": "2024", "title": "Decolonization of tourism: A practical approach to progressing the SDGs.", "themes": ["tourism", "indigenous"], "summary": "将旅游去殖民化与可持续发展目标（SDGs）的框架放在一起批判性地审视。批判旅游作为新殖民工具的历史：收益流出目的地社区（外资所有权），他者化机制系统性地否认东道社区的主体性。提出以人民为中心（people-centred）/自下而上（bottom-up）的去殖民旅游治理原则，强调free, prior, and informed consent（FPIC）作为核心制度保障。", "keyArgs": [{"term": "旅游-新殖民的结构性批判", "exp": "Britton（1982）：旅游收益因外资所有权而流出当地——旅游并非为目的地利益设计的系统。大规模渗漏（leakage）与高度外部控制的mass tourism密切相关。旅游暴露为全球体系的一部分，而这个体系根本上不是为目的地的利益设计的。"}, {"term": "他者化（othering）机制", "exp": "Kincaid/Staszak：游客通过他者化重写地方与居民，将其异域化/浪漫化/降格为被消费的对象。定居殖民结构（Wolfe/Chambers & Buzinde）：殖民主义不只是历史事件，而是持续塑造旅游的物质与话语运行的结构。"}, {"term": "SDGs的批判性审视", "exp": "McCloskey批评：MDGs没有培养批判意识，未触及贫困的结构性根源。SDG框架中的旅游-SDG 1（减贫）关系：没有创造真正的有利环境；大部分研究没有提出实际可行的解决方式。"}, {"term": "FPIC原则（自由、事先、知情同意）", "exp": "Free（不受胁迫）/Prior（决策之前）/Informed（获得充分信息）/Consent（真正的同意）。这是保障原住民自主控制权的核心制度机制，需要具体的程序性设计，不只是形式上的咨询。"}, {"term": "去殖民旅游的实践路径", "exp": "以人民为中心、自下而上的旅游治理；有意识地改变北-南/贫-富权力关系；归还原住民对土地和文化的自主控制权。旅游不只是叙事的去殖民，而是资源控制/知识生产/治理逻辑的去殖民。"}], "questions": ["SDG框架是否有足够的批判性资源来挑战殖民逻辑，还是它本身就内嵌于新自由主义发展话语，无法触及根本？", "在什么条件下，旅游可以真正成为去殖民实践，而不只是改良性的包容旅游？", "FPIC原则如何在实际旅游项目的制度设计中落地？有哪些成功/失败案例？"], "thinkers": ["Agbo", "Grimwood", "Britton", "Scheyvens", "Chambers", "Buzinde", "Wolfe", "Fanon", "Smith", "Tuck", "Yang"], "method": "在旅游研究中，分析旅游收益流向：谁受益，谁被剥夺？咨询（consultation）是否真正等于同意（consent）？决策过程中谁有实质性权力？", "note": "", "related": ["Bigby et al 2022", "Corntassel 2012", "Stinson et al 2022", "King et al 2023", "Tuck & Yang 2012"], "quotes": [{"text": "Britton (1982): tourism revenues flow out of local communities due to foreign ownership — tourism is not a system designed for destination benefits. Large-scale leakage is closely related to highly externally controlled mass tourism. Tourism is exposed as part of a global system not fundamentally designed for destination interests.", "src": "Britton (1982), cited in Agbo & Grimwood (2024, p.4)"}, {"text": "FPIC principle: Free (without coercion) / Prior (before decisions) / Informed (with full information) / Consent (genuine agreement). This is the core institutional mechanism to protect Indigenous peoples' autonomous control rights, requiring specific procedural design, not merely formal consultation.", "src": "Agbo & Grimwood (2024, p.9)"}, {"text": "SDG framework critique (McCloskey): MDGs did not cultivate critical consciousness and did not touch the structural roots of poverty. Tourism–SDG 1 (poverty reduction) relationship: has not created a genuinely enabling environment; most research does not propose actually feasible solutions.", "src": "McCloskey, cited in Agbo & Grimwood (2024, p.6)"}]}, {"id": 34, "author": "King, L. J., et al.", "year": "2023", "title": "Land-based methodologies and disrupting settler colonial legacies in parks. Leisure/Loisir, 47(1).", "themes": ["indigenous", "method"], "summary": "以Lutsel K'e Dene First Nation的Tracking Change项目为案例，探讨土地基方法论（land-based methodologies）在公园和保护区研究中如何扰动定居殖民遗产。方法论核心：观察变化（observing change）/讲述土地（storying land）/培育社区能力（fostering community capacities）。深化Community-Based Participatory Research（CBPR）框架：在实践中，社区参与深度很不一致，需要更深层的承诺。", "keyArgs": [{"term": "公园的矛盾角色", "exp": "国家公园同时保护领土和限制原住民进入/使用——这是定居殖民的制度化体现（Binnema & Niemi, 2006）。学术研究通过研究实践延续殖民权力（Smith, 1999）：公园作为资源景观和旅游商品的叙事，将原住民治理话语边缘化。"}, {"term": "土地基方法论的三个目标", "exp": "①Observing change：通过原住民知识框架观察土地变化；②Storying land：通过故事把土地的法律-伦理意义嵌入身体经验和记忆；③Fostering community capacities：研究过程本身就是培育社区自主能力的过程，而非外部知识提取。"}, {"term": "长者作为理论家", "exp": "长者是专家，知识通过实践与故事传承（Simpson, 2002）。通过让人回到土地、实践传统采集等活动，对抗settler colonialism，强化家庭纽带，支持传统治理结构与土地经济。长者不只是信息提供者，而是知识体系的守护者和理论家。"}, {"term": "CBPR的四R深化", "exp": "Respect/Relevance/Reciprocity/Responsibility。在实践中，社区参与深度不一致（Castleden et al., 2012）。需要问：谁真正在控制研究议程？社区成员是研究的合作者还是被研究对象？"}, {"term": "研究方法即研究成果", "exp": "life-story + photo-elicitation + land-based observation本身就是追求的核心目标，不只是数据收集工具。方法论承诺：研究过程必须体现所追求的价值（互惠/尊重/关系性）。"}], "questions": ["如何确保研究方法本身不复制殖民逻辑？即便是CBPR，在具体执行中如何避免社区被当作数据来源而非真正的合作者？", "当co-management机制仍带有强烈殖民逻辑时，土地基方法论能否在这个体制内找到空间，还是必然与体制产生冲突？", "研究方法与结果的融合：如何向学术评审者/资助机构解释，研究过程本身就是成果？"], "thinkers": ["King", "Grimwood", "Lutsel K'e Dene", "Smith", "Simpson", "Wildcat", "Alfred"], "method": "土地基方法论要求研究者真正在土地上进行研究，而非将土地作为抽象的分析单位。需要长期承诺（不是单次田野），以及对社区时间节奏和知识传承方式的尊重。", "note": "", "related": ["Smith 2012", "Wilson 2008", "Corntassel 2012", "Bigby et al 2022", "Agbo & Grimwood 2024"], "quotes": [{"text": "National parks simultaneously protect territories and restrict Indigenous access/use — the institutionalisation of settler colonialism (Binnema & Niemi, 2006). Academic research perpetuates colonial power through research practices (Smith, 1999): narratives of parks as resource landscapes and tourism commodities marginalise Indigenous governance discourse.", "src": "Binnema & Niemi (2006); Smith (1999), cited in King et al. (2023, p.123)"}, {"text": "Three goals of land-based methodologies: ① Observing change: through Indigenous knowledge frameworks; ② Storying land: embedding the legal-ethical meaning of land in bodily experience and memory; ③ Fostering community capacities: the research process itself cultivates community autonomy.", "src": "King et al. (2023, pp.126–128)"}, {"text": "Elders as theorists: knowledge is transmitted through practice and story (Simpson, 2002). Through activities like returning to land, practising traditional harvesting, etc., countering settler colonialism, strengthening family bonds, supporting traditional governance structures and land economies.", "src": "Simpson (2002), cited in King et al. (2023, p.130)"}]}, {"id": 35, "author": "Tuck, E. & Yang, Y.K.", "year": "2012", "title": "Decolonization is not a metaphor. Decolonization: Indigeneity, Education & Society, 1(1).", "themes": ["indigenous", "crt"], "summary": "核心命题：去殖民化不是其他事物的隐喻，没有同义词，也没有等价物。批判将去殖民化稀释为一般社会正义话语（settler moves to innocence：六种）。定居殖民主义是一个结构（Wolfe），不是历史事件；土地归还（repatriation of Indigenous land and life）是去殖民化的实质内容，不是隐喻。强调可通约性伦理（ethic of incommensurability）：不同项目不能相互替代。", "keyArgs": [{"term": "定居殖民主义是结构（Wolfe）", "exp": "不是过去某个时间点发生的历史事件，而是持续运作的结构——come to stay。Triad结构：settler（定居者）/native（原住民）/slave（奴隶）三方位置截然不同，不可等同。Settlers are not immigrants：定居者来到是为了取代，而非为了参与原有社会。"}, {"term": "去殖民化等于土地归还", "exp": "Real decolonization means the repatriation of Indigenous land and life，不只是改变叙事/态度/课程/多样性指标。这是物质性的（material），不是比喻性的（metaphorical）。把去殖民化用作隐喻，实际上是settler moves to innocence的一种形式。"}, {"term": "六种Settler Moves to Innocence", "exp": "①Settler nativism（殖民者原住民化）；②Adoption fantasy（收养幻想）；③Colonial equivocation（殖民等同化）；④Conscientização（觉醒化，对Freire的批判）；⑤At risk-ing indigenous peoples（将原住民视为脆弱群体）；⑥Re-occupation and urban homesteading（重新占领，借用去殖民语言做别的事）。"}, {"term": "对Freire的批判", "exp": "Paulo Freire的解放教育没有原住民/定居者的结构区分；假定存在一个无辜的第三者；意识解放不自动等于土地归还。这对批判教育学有重要含义。"}, {"term": "可通约性伦理", "exp": "Ethic of incommensurability：去殖民化不能被稀释为一般社会正义、不能等同于decentering whiteness、不能被反种族主义或女性主义所代替。不同的解放项目有各自特定的内容，不可互相替代，这不是竞争而是各自的完整性。"}], "questions": ["去殖民化作为土地归还在非北美/非澳大利亚语境中（如中国、亚洲）如何理解？其核心逻辑是否可迁移？", "Freire的解放教育被批判忽视了settler-native的结构差异——是否意味着在原住民教育中，Freire的框架需要被根本性地修正？", "去殖民化与anti-colonialism（反殖民主义）的实质差异：前者要求土地归还，后者可能只是反对殖民体系——这个区分如何影响研究立场？"], "thinkers": ["Tuck", "Yang", "Wolfe", "Coulthard", "Fanon", "Smith", "Freire", "Said", "Blaut"], "method": "在研究写作中，检验：我是否在用去殖民化作为社会正义的通用标签？我的研究是否触及了土地关系和主权问题，还是只在话语层面运作？", "note": "", "related": ["Smith 2012", "Corntassel 2012", "Melamed 2015", "Ladson-Billings 1998", "Agbo & Grimwood 2024"], "quotes": [{"text": "Settler colonialism is a structure (Wolfe), not a historical event — come to stay. Triad structure: settler/native/slave — the three positions are fundamentally different and cannot be equated. Settlers are not immigrants: settlers come to replace, not to participate in the original society.", "src": "Wolfe, cited in Tuck & Yang (2012, p.6)"}, {"text": "Decolonisation = land repatriation: real decolonisation means the repatriation of Indigenous land and life — not just changing narratives/attitudes/curricula/diversity indicators. It is material, not metaphorical. Using decolonisation as a metaphor is itself a settler move to innocence.", "src": "Tuck & Yang (2012, pp.7–8)"}, {"text": "Six Settler Moves to Innocence: ① Settler nativism; ② Adoption fantasy; ③ Colonial equivocation; ④ Conscientização (critique of Freire); ⑤ At risk-ing Indigenous peoples; ⑥ Re-occupation and urban homesteading. Each allows settlers to claim decolonial sentiment while remaining structurally comfortable.", "src": "Tuck & Yang (2012, pp.9–16)"}, {"text": "Critique of Freire: Paulo Freire's liberatory education lacks the structural distinction between Indigenous/settler; assumes an innocent third party; consciousness liberation does not automatically equal land repatriation. This has important implications for critical pedagogy.", "src": "Tuck & Yang (2012, p.14)"}, {"text": "Ethic of incommensurability: decolonisation cannot be diluted into general social justice, cannot be equated with decentering whiteness, cannot be replaced by anti-racism or feminism. Different liberation projects have their own specific content — not competing but each integral.", "src": "Tuck & Yang (2012, p.21)"}]}, {"id": 36, "author": "Taylor, K-Y. (Ed.)", "year": "2017", "title": "How We Get Free: Black Feminism and the Combahee River Collective.", "themes": ["feminist", "crt"], "summary": "通过介绍和收录Combahee River Collective（CRC）1977年声明及相关访谈，展示Black feminism作为政治传统的历史根源和当代意义。核心：interlocking oppression（交织压迫）的综合分析，integrated analysis and practice。强调If Black women were free, it would mean everyone else would have to be free这一命题的政治逻辑：黑人女性位于所有主要压迫系统的交汇点，其自由是普遍自由的条件而非特殊诉求。", "keyArgs": [{"term": "If Black women were free...", "exp": "如果黑人女性获得自由，就意味着每个人都必须获得自由——因为黑人女性处于种族/性别/阶级/异性恋规范等所有主要压迫系统的交汇点。这不是身份政治的特殊诉求，而是对压迫系统的完整分析：要解放处于最多重压迫处的人，必须拆除所有压迫系统。"}, {"term": "Identity politics的原始意义", "exp": "为了我们自己（黑人女性）争自由，而非身份的碎片化政治。来自历史经验+运动经验+个人经验+结构性经济位置的共同产物，不是凭空建构的。与后来被学院改造后的identity politics（成为标签/话语）形成对比。"}, {"term": "Tokenism（象征性代表）", "exp": "机构中的黑人女性代表可能只是象征性地证明机构的包容性，而不改变权力结构。与Non-performativity（Ahmed）的逻辑一致：代表性的宣示掩盖了实质性不平等的持续。"}, {"term": "结构性经济限制", "exp": "当黑人女性处于极度经济脆弱时，可能依赖家庭内的父权结构以获得某种稳定感，因此不一定能挑战男性主导。这不是意识不足的问题，而是真实物质处境的约束——强调了物质条件对政治实践的制约。"}, {"term": "社会主义女性主义的立场", "exp": "Socialists：马克思对资本主义阶级关系的分析，在特定历史语境下具有启发性。但需要扩展马克思主义，使其足以解释黑人女性的特定经济位置——种族/性别/阶级不可被还原为单一维度。"}], "questions": ["Tokenism如何在机构中以包容形式运作，同时实质上强化了原有权力结构？如何设计制度机制来区分真正的代表性和象征性代表？", "Socialist feminism如何具体地扩展马克思主义以解释黑人女性的经济位置，而不只是简单叠加分析维度？", "If Black women were free的逻辑如何应用于其他语境（如中国少数民族女性、LGBTQ群体）？是否存在类似的最多重压迫交汇点？"], "thinkers": ["Combahee River Collective", "Davis", "Lorde", "Walker", "Truth", "Smith", "hooks"], "method": "研究压迫的交叉性时，从最多重压迫的位置出发进行分析，而非从中间位置添加差异。这提供了一种方法论原则：从边缘而非中心建构理论。", "note": "If Black women were free... 这句话在第一次读到时让我沉默了很久。", "related": ["hooks 1991", "Hesse-Biber 2007", "Crenshaw et al 1995", "Melamed 2015", "Valtchanov & Parry"], "quotes": [{"text": "Interlocking oppression: race, gender, heteronormativity, and class oppression analysed and practised together. Integrated analysis and practice. Black feminist politics: 'If Black women were free, it would mean everyone else would have to be free.'", "src": "Combahee River Collective (1977), cited in Taylor (2017, p.11)"}, {"text": "Identity politics in its original sense: fighting for freedom for ourselves (Black women) — not the fragmented politics of identity. A collective product of historical experience + movement experience + personal experience + structural economic position. Distinct from the later academicised identity politics (becoming labels/discourse).", "src": "Combahee River Collective (1977), cited in Taylor (2017, p.14)"}, {"text": "Structural difficulties: when many Black women are in extreme economic vulnerability, they may feel a father-dominant household structure at least brings some stability, so they may not dare/want to challenge male dominance. Not a question of insufficient consciousness, but of real material constraints.", "src": "Taylor (2017, p.23)"}, {"text": "Tokenism: Black women's representation in institutions may only symbolically prove the institution's inclusivity without changing power structures. Consistent with Non-performativity (Ahmed): the declaration of representation conceals the persistence of substantive inequality.", "src": "Taylor (2017, p.29)"}]}, {"id": 37, "author": "Changfoot, N., et al.", "year": "2022", "title": "Revisioning aging: Indigenous, crip and queer renderings. Journal of Aging Studies, 63.", "themes": ["queer", "indigenous", "crt"], "summary": "批判活跃老龄化（active aging）的biopedagogy（身体规训教育学）：其异性恋规范/能力主义/核心家庭的隐含假设将原住民/残障者/酷儿系统性地边缘化或宣判为无未来（Kafer, 2013）。通过原住民循环时间性/Cripped aging/Queer aging三种视角，提出多元老龄化叙事。Re-Vision Centre的affirmative approach to bodymind difference作为实践案例。", "keyArgs": [{"term": "活跃老龄化的Biopedagogy批判", "exp": "主流老龄化模型的隐含标准：active/sedentary; ability/disability; able-minded/dementia; independence/dependence——这些二元对立共同服务于异性恋/健体/健心/财务安全/繁衍延续的biopedagogy。原住民/残障者/酷儿被隐形或被宣判为无未来，被排除在成功老龄化的叙事之外。"}, {"term": "Cripped aging", "exp": "将crip（残障的自我命名再挪用）动词化为to crip：积极欲求残障社群；打断线性进步的straight time；承认身体差异的内在价值。Crip queer time（Rice et al., 2017）：多元/情感化/非线性，使被排除的身心进入未来想象。"}, {"term": "原住民循环时间性（Anishinaabe）", "exp": "Kwey（Anishinaabe女性）长者的story medicine（故事药）：展现循环时间/关系与社群的持续。以社群/与土地的内在连结/情感性具身经验/同步-循环时间性替代线性时间。代际与土地关系取代核心家庭/个人成就的衡量标准。"}, {"term": "反治愈时间（Kafer 2013）", "exp": "Curative time的反向摆位：主流老龄化政策以延缓衰退/维持功能为目标，这本身就是一种治愈逻辑（curative logic）。反治愈时间拒绝以能力恢复/功能维持为成功老龄化的标准，转而强调存在的尊严和多元时间性。"}, {"term": "多重关系网络替代核心家庭", "exp": "这些老龄化叙事抵抗成功老龄化的异性繁衍想象，不以伴侣-核心家庭为唯一轴心，而是位于多重关系网络与非核家庭景观中。时间作为连续-循环流；对健康/财富/核心家庭指标的拒斥与反抗性未来。"}], "questions": ["主流老龄化政策框架不承认原住民语境——如何重新设计成功老龄化的测量框架，以纳入关系性/循环时间/土地连结等维度？", "多重关系网络与非核家庭景观中的幸福（flourishing）如何被操作化为研究变量，而不被主流心理学量表所化约？", "Crip queer time与原住民循环时间之间的对话：有哪些共鸣和差异？这对建立跨差异的批判联盟意味着什么？"], "thinkers": ["Changfoot", "Kafer", "Rice", "Sandberg", "Marshall", "Russo"], "method": "在研究老龄化时，审查所使用的时间假设：是否默认了线性进步和功能维持的标准？如何纳入非线性/循环/关系性的时间视角？", "note": "", "related": ["Bailey et al 2023", "Halberstam 2005", "Hamrie & Fritsch 2019", "Valtchanov & Parry"], "quotes": [{"text": "Biopedagogy critique of active ageing: active/sedentary; ability/disability; able-minded/dementia; independence/dependence — these binaries serve the biopedagogy of hetero-reproduction/healthy body/financial security. Indigenous/disabled/queer people are rendered invisible or sentenced to 'no future'.", "src": "Kafer (2013), cited in Changfoot et al. (2022, p.4)"}, {"text": "Cripped ageing: to crip = actively desiring disabled community; interrupting the straight time of linear progress; acknowledging the intrinsic value of bodily difference. Crip queer time (Rice et al., 2017): plural/affective/non-linear, enabling excluded bodymind to enter the imagination of futures.", "src": "Rice et al. (2017), cited in Changfoot et al. (2022, p.7)"}, {"text": "Anishinaabe circular temporality: Kwey (Anishinaabe women) elders' story medicine — displaying circular time, relationships, and community continuity. Replacing linear time with community/inner connection to land/affective embodied experience/synchronous-circular temporality.", "src": "Changfoot et al. (2022, pp.9–10)"}, {"text": "Curative time (Kafer, 2013): mainstream ageing policy aims to delay decline/maintain function — this is itself a curative logic. Anti-curative time refuses to use ability restoration/function maintenance as the standard of successful ageing, emphasising instead the dignity of existence and plural temporality.", "src": "Kafer (2013), cited in Changfoot et al. (2022, p.11)"}]}, {"id": 38, "author": "Hamrie, A. & Fritsch, K.", "year": "2019", "title": "Crip technoscience manifesto. Catalyst: Feminism, Theory, Technoscience, 5(1).", "themes": ["crt", "leisure"], "summary": "提出Crip technoscience作为一个知识-行动框架：残障者及其盟友在日常生活/运动/学术场域中开展的knowing-making实践。把技术-科学专业权威转移到具有残障生活经验的人身上，系统性质疑医疗化/修复/治愈逻辑。四项核心承诺：互依（interdependence）/可达亲密性（access intimacy）/拆除修复-治愈逻辑/Disability justice框架。", "keyArgs": [{"term": "Crip的再挪用", "exp": "Crip是一个自我命名的再挪用（reclamation）：从污名性词语到抵抗能力主义的分析工具。能被crip化的斗争现场：hack/tinker/reclaim——不只是接受残障，而是主动欲求残障社群，拒绝以正常化为目标。"}, {"term": "Frictional access（带摩擦的可达性）", "exp": "把传统中性翻译式的无障碍转向群体共创的审美-政治实践。把无障碍/access看作带摩擦的/杂糅的/集体的实验过程，反对简化为合规清单。Critical crowdsourcing（批判性众包）：反对慈善式众包，转向政治性集体实践。"}, {"term": "Disability justice四原则", "exp": "反能力主义（anti-ableism）/反生产力主义（anti-productivity）/交叉性（intersectionality）/集体解放（collective liberation）+完整性（wholeness）。完整性的重新诠释：完整与破碎并非对立，可置于张力中；脱离资本主义生产力标准评估人的价值。"}, {"term": "互依（interdependence）", "exp": "残障者从被照料-被评估的对象转变为关系网络中的能动主体。Care不是从强者流向弱者的单向给予，而是相互依赖的网络实践。这对休闲研究中的照护/身体/能力讨论有直接含义。"}, {"term": "Crip cartography", "exp": "Mapping Access：绘制空间的可达性地图，作为批判性认识论实践——不只是提供信息，而是揭示空间权力关系，并产生新的集体行动基础。"}], "questions": ["在承认差异与避免被差异化排斥之间的悖论：我只有承认自己不同才能被平等对待，但承认不同又把我变成了需要特殊对待的他者——这个悖论有没有出路？", "泰国跨性别者的复杂处境：法律层面无法更改性别标记的歧视/性旅游业的经济压力/手术的经济动机——Crip框架如何处理这种交叉性？", "Crip technoscience与能力主义-资本主义之间的张力：在需要生产力的经济体系中，如何实践反生产力主义的价值？"], "thinkers": ["Hamrie", "Fritsch", "Berne", "Sins Invalid", "Kafer", "Meekosha", "Rice"], "method": "在研究残障/身体/照护时，把残障者视为知识-行动框架的主体，而非研究对象。分析空间/制度/政策的access结构：谁被包括，谁被排除，包括/排除的条件是什么？", "note": "", "related": ["Bailey et al 2023", "Changfoot et al 2022", "Valtchanov & Parry", "Lopez 2024"], "quotes": [{"text": "Crip is a self-naming reclamation — from a stigmatising word to an analytical tool resisting ableism. Crip as verb: hack/tinker/reclaim — not just accepting disability, but actively desiring disabled community, refusing normalisation as the goal.", "src": "Hamrie & Fritsch (2019, p.3)"}, {"text": "Frictional access (Carmen Papalia's Blind Field Shuttle): shifting from traditional neutral translation-style accessibility to group co-created aesthetic-political practice. Access as a friction-bearing/hybrid/collective experimental process — not reducible to a compliance checklist.", "src": "Hamrie & Fritsch (2019, p.8)"}, {"text": "Disability justice four principles: anti-ableism / anti-productivism / intersectionality / collective liberation + wholeness. Wholeness reinterpreted: wholeness and brokenness are not opposites but can be held in tension; evaluating human value detached from capitalist productivity standards.", "src": "Hamrie & Fritsch (2019, pp.10–11)"}, {"text": "Interdependence: disabled people transformed from objects of care-and-assessment to active subjects in relational networks. Care is not a one-way gift flowing from strong to weak, but a practice of mutual dependence in relational networks.", "src": "Hamrie & Fritsch (2019, p.14)"}]}]
</script>

<script>
const THEMES={method:"方法论框架",indigenous:"原住民方法论",positivism:"实证主义",phenomenology:"现象学",constructionism:"社会建构主义",critical:"批判理论",feminist:"女性主义",crt:"批判种族理论",queer:"酷儿理论",poststructural:"后结构主义",materialism:"新唯物主义",tourism:"旅游/去殖民",leisure:"休闲研究",neuro:"神经科学"};
let DATA=[],state={theme:"all",q:"",sort:"default",view:"grid"};
let progress={},notes={},bookmarks={};
function loadStorage(){try{progress=JSON.parse(localStorage.getItem("rec700_progress")||"{}");notes=JSON.parse(localStorage.getItem("rec700_notes")||"{}");bookmarks=JSON.parse(localStorage.getItem("rec700_bookmarks")||"{}")}catch(e){}}
function saveProgress(){localStorage.setItem("rec700_progress",JSON.stringify(progress))}
function saveNotes(){localStorage.setItem("rec700_notes",JSON.stringify(notes))}
function saveBookmarks(){localStorage.setItem("rec700_bookmarks",JSON.stringify(bookmarks))}
function updateStats(){
  const read=Object.values(progress).filter(v=>v===2).length;
  const reading=Object.values(progress).filter(v=>v===1).length;
  const bk=Object.values(bookmarks).filter(Boolean).length;
  document.getElementById("sRead").textContent=read;
  document.getElementById("sReading").textContent=reading;
  document.getElementById("sBookmarked").textContent=bk;
  const pct=DATA.length?Math.round(read/DATA.length*100):0;
  document.getElementById("pPct").textContent=pct+"%";
  document.getElementById("pFill").style.width=pct+"%";
}
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function highlight(text,q){
  if(!q||!text)return esc(text||"");
  const e2=q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
  return esc(text).replace(new RegExp("("+e2+")","gi"),"<mark>$1</mark>");
}
function cycleSort(){
  const orders=["default","author","year"];
  const labels=["排序：默认 ↕","排序：作者 A-Z","排序：年份 ↑"];
  const idx=orders.indexOf(state.sort);
  state.sort=orders[(idx+1)%3];
  document.getElementById("sortBtn").textContent=labels[(idx+1)%3];
  render();
}
function toggleView(){
  state.view=state.view==="grid"?"compact":"grid";
  document.getElementById("viewBtn").textContent=state.view==="grid"?"紧凑视图":"卡片视图";
  document.getElementById("grid").className=state.view==="compact"?"grid compact":"grid";
  render();
}
function exportNotes(){
  const lines=["# REC 700 个人知识体系库 — 导出笔记","导出时间："+new Date().toLocaleDateString("zh-CN"),"","---",""];
  DATA.forEach(r=>{const n=notes[r.id];const p=progress[r.id];if(n&&n.trim()){lines.push("## "+r.author+" ("+r.year+")");lines.push("**"+r.title+"**");lines.push("状态："+(p===2?"已读":p===1?"阅读中":"未读"));lines.push("");lines.push("### 个人笔记");lines.push(n);lines.push("");lines.push("---","");}});
  const blob=new Blob([lines.join("\n")],{type:"text/markdown"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="REC700_笔记导出.md";a.click();
}
function render(){
  const q=state.q.toLowerCase().trim();
  let filtered=DATA.filter(r=>{
    if(state.theme!=="all"&&!r.themes.includes(state.theme))return false;
    if(!q)return true;
    const s=[r.author,r.year,r.title,r.summary,r.note||"",r.method||"",(r.keyArgs||[]).map(c=>c.term+" "+c.exp).join(" "),(r.questions||[]).join(" "),(r.thinkers||[]).join(" "),r.themes.map(t=>THEMES[t]||t).join(" ")].join(" ").toLowerCase();
    return q.split(" ").every(w=>s.includes(w));
  });
  if(state.sort==="author")filtered.sort((a,b)=>a.author.localeCompare(b.author));
  else if(state.sort==="year")filtered.sort((a,b)=>parseInt(a.year||0)-parseInt(b.year||0));
  document.getElementById("rbar").textContent=(q||state.theme!=="all")?"找到 "+filtered.length+" 条结果":"共 "+DATA.length+" 篇阅读";
  const grid=document.getElementById("grid");grid.innerHTML="";
  if(!filtered.length){grid.innerHTML='<div class="empty"><div class="empty-icon">◎</div><p>未找到匹配结果</p></div>';return;}
  filtered.forEach((r,i)=>{
    const th=r.themes[0]||"method";
    const p=progress[r.id]||0;
    const bk=bookmarks[r.id]||false;
    const sLabels=["未读","阅读中","已读"];
    const tags=r.themes.map(t=>'<span class="tag tag-'+t+'">'+( THEMES[t]||t)+'</span>').join("");
    const args=(r.keyArgs||[]).map(c=>'<li><b>'+esc(c.term)+'</b>'+esc(c.exp)+'</li>').join("");
    const qs=(r.questions||[]).map(q=>'<li>'+esc(q)+'</li>').join("");
    const thinkers=(r.thinkers||[]).map(t=>'<span class="thinker-tag">'+esc(t)+'</span>').join("");
    const rel=(r.related||[]).map(n=>'<span class="related-tag" onclick="filterByRelated(\''+esc(n.replace(/'/g,""))+'\')">'+esc(n.length>22?n.slice(0,22)+"…":n)+'</span>').join("");
    const noteVal=esc(notes[r.id]||"");
    const summaryH=highlight(r.summary,q);
    const card=document.createElement("div");
    card.className="card";card.style.animationDelay=(i*0.03)+"s";card.dataset.id=r.id;
    card.innerHTML=
      '<div class="card-top top-'+th+'"></div>'+
      '<div class="card-main">'+
        '<div class="card-meta">'+
          '<div>'+
            '<div class="card-author">'+esc(r.author)+'</div>'+
            '<div class="card-year">'+esc(r.year)+'</div>'+
            '<div class="card-title-text">'+esc(r.title)+'</div>'+
          '</div>'+
          '<span class="status-badge status-'+p+'" onclick="cycleStatus(event,'+r.id+')">'+sLabels[p]+'</span>'+
        '</div>'+
        '<div class="card-tags">'+tags+'</div>'+
        '<div class="card-summary">'+summaryH+'</div>'+
      '</div>'+
      '<div class="card-detail">'+
        (r.quotes&&r.quotes.length?'<div class="section-label" style="margin-top:12px">原文引用</div><ul class="quotes-list">'+r.quotes.map(q=>'<li class="quote-item"><div class="quote-text">'+esc(q.text)+'</div><div class="quote-src">— '+esc(q.src)+'</div></li>').join('')+'</ul>':"")+
        (args?'<div class="detail-sep"></div><div class="section-label">核心论点与概念</div><ul class="keyargs-list">'+args+'</ul>':"")+
        (qs?'<div class="section-label" style="margin-top:12px">批判性问题</div><ul class="q-list">'+qs+'</ul>':"")+
        (thinkers?'<div class="section-label" style="margin-top:12px">关键理论家</div><div class="thinkers-wrap">'+thinkers+'</div>':"")+
        (r.method?'<div class="section-label" style="margin-top:12px">方法论启示</div><div class="method-box">'+esc(r.method)+'</div>':"")+
        (rel?'<div class="section-label" style="margin-top:12px">相关阅读</div><div class="related-wrap">'+rel+'</div>':"")+
        '<div style="margin-top:12px"><div class="section-label">个人笔记</div><div class="note-section"><textarea placeholder="记录你的想法、联系、延伸阅读…" onchange="saveNote('+r.id+',this.value)">'+noteVal+'</textarea><div class="note-save-indicator" id="si-'+r.id+'" style="opacity:0">已自动保存 ✓</div></div></div>'+
        (r.note?'<div class="section-label" style="margin-top:8px">原始笔记摘录</div><div class="method-box" style="border-color:#5a4a2a;background:rgba(90,74,42,.08)">'+esc(r.note)+'</div>':"")+
      '</div>'+
      '<div class="card-footer">'+
        '<button class="toggle-btn" onclick="toggleCard(this)"><span class="tl">展开详情</span><span class="toggle-arrow">▼</span></button>'+
        '<button class="bookmark-btn'+( bk?" active":"")+'" onclick="toggleBookmark(event,'+r.id+')" title="收藏">'+( bk?"★":"☆")+'</button>'+
      '</div>';
    grid.appendChild(card);
  });
}
function toggleCard(btn){const card=btn.closest(".card");card.classList.toggle("open");btn.querySelector(".tl").textContent=card.classList.contains("open")?"收起":"展开详情";}
function cycleStatus(e,id){e.stopPropagation();progress[id]=((progress[id]||0)+1)%3;saveProgress();updateStats();const badge=e.target;badge.className="status-badge status-"+progress[id];badge.textContent=["未读","阅读中","已读"][progress[id]];}
function toggleBookmark(e,id){e.stopPropagation();bookmarks[id]=!bookmarks[id];saveBookmarks();updateStats();const btn=e.target;btn.classList.toggle("active",bookmarks[id]);btn.textContent=bookmarks[id]?"★":"☆";}
function saveNote(id,val){notes[id]=val;saveNotes();const ind=document.getElementById("si-"+id);if(ind){ind.style.opacity="1";setTimeout(()=>{ind.style.opacity="0"},2000);}}
function filterByRelated(name){document.getElementById("srch").value=name;state.q=name;document.querySelectorAll(".pill").forEach(p=>p.classList.remove("active"));document.querySelector(".pill[data-theme=\"all\"]").classList.add("active");state.theme="all";render();}
document.getElementById("srch").addEventListener("input",e=>{state.q=e.target.value;render();});
document.querySelectorAll(".pill").forEach(pill=>{pill.addEventListener("click",()=>{document.querySelectorAll(".pill").forEach(p=>p.classList.remove("active"));pill.classList.add("active");state.theme=pill.dataset.theme;render();});});
loadStorage();
try{DATA=JSON.parse(document.getElementById("jdata").textContent);}catch(e){console.error("Data parse error",e);}
document.getElementById("sTotal").textContent=DATA.length;
updateStats();render();
</script>
</body>
</html>
