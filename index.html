<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REC 700 · 个人知识体系库</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0e0c;--bg2:#181714;--bg3:#201e1a;--border:#2e2b26;--amber:#c8953a;--amber-l:#e8b86d;--amber-d:#7a5820;--cream:#e8e0d0;--cream-d:#9a9080;--green:#3a7a4a;--blue:#3a5878;--red:#b85042;--purple:#6b5a8c}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--cream);font-family:'Noto Sans SC',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--amber-d)}
header{padding:48px 56px 32px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(200,149,58,.07) 0%,transparent 100%)}
.eyebrow{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--amber);margin-bottom:10px}
.h-title{font-family:'IM Fell English',serif;font-size:clamp(32px,5vw,58px);line-height:1.05;color:var(--cream)}
.h-title span{color:var(--amber)}
.h-sub{margin-top:10px;font-size:13px;color:var(--cream-d);line-height:1.9}
.stats-bar{display:flex;gap:0;margin-top:24px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.stat-item{flex:1;padding:14px 20px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:3px}
.stat-item:last-child{border-right:none}
.stat-n{font-family:'IM Fell English',serif;font-size:26px;color:var(--amber);line-height:1}
.stat-l{font-size:11px;color:var(--cream-d);letter-spacing:.5px}
.progress-wrap{padding:14px 20px;flex:2;display:flex;flex-direction:column;gap:6px;justify-content:center}
.progress-label{font-size:11px;color:var(--cream-d);display:flex;justify-content:space-between}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--amber-d),var(--amber));border-radius:2px;transition:width .5s ease}
.controls{padding:20px 56px;position:sticky;top:0;z-index:100;background:rgba(15,14,12,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.ctrl-row1{display:flex;gap:10px;margin-bottom:12px}
.search-wrap{flex:1;position:relative}
.search-wrap input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:10px 14px 10px 40px;color:var(--cream);font-family:'Noto Sans SC',sans-serif;font-size:13px;font-weight:300;outline:none;transition:border-color .2s}
.search-wrap input::placeholder{color:var(--cream-d);opacity:.5}
.search-wrap input:focus{border-color:var(--amber-d)}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--amber-d);font-size:14px;pointer-events:none}
.ctrl-btn{padding:10px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--cream-d);font-size:12px;font-family:'Noto Sans SC',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}
.ctrl-btn:hover{border-color:var(--amber-d);color:var(--amber-l)}
.filter-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.filter-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--amber-d);margin-right:4px}
.pill{padding:4px 13px;border-radius:100px;border:1px solid var(--border);font-size:11px;font-family:'Noto Sans SC',sans-serif;font-weight:300;cursor:pointer;transition:all .15s;background:transparent;color:var(--cream-d)}
.pill:hover{border-color:var(--amber-d);color:var(--amber-l)}
.pill.active{background:var(--amber);border-color:var(--amber);color:var(--bg);font-weight:500}
.results-bar{padding:12px 56px 0;font-size:11px;color:var(--cream-d);letter-spacing:.5px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:16px;padding:20px 56px 80px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;transition:transform .2s,box-shadow .2s,border-color .2s;animation:fadeUp .35s ease both}
.card:hover{transform:translateY(-2px);box-shadow:0 10px 36px rgba(0,0,0,.5);border-color:var(--amber-d)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.card-top{height:3px;flex-shrink:0}
.card-main{padding:20px 24px 14px;flex:1}
.card-meta{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.card-author{font-family:'IM Fell English',serif;font-size:16px;color:var(--cream);line-height:1.2}
.card-year{font-size:10px;color:var(--amber);letter-spacing:1px;margin-top:2px}
.card-title-text{font-size:11.5px;color:var(--cream-d);margin-top:3px;line-height:1.5;font-style:italic}
.status-badge{flex-shrink:0;padding:3px 9px;border-radius:100px;font-size:10px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid;user-select:none;white-space:nowrap}
.status-0{border-color:#444;color:#666;background:transparent}
.status-1{border-color:#7a5820;color:#c8953a;background:rgba(200,149,58,.1)}
.status-2{border-color:#2a5a2a;color:#4a9a4a;background:rgba(74,154,74,.1)}
.card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.tag{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500;letter-spacing:.3px}
.card-summary{font-size:12.5px;line-height:1.85;color:var(--cream-d);margin-top:10px}
mark{background:rgba(200,149,58,.25);color:var(--amber-l);border-radius:2px;padding:0 1px}
.card-detail{display:none;padding:0 24px 20px;flex-direction:column;gap:14px}
.card.open .card-detail{display:flex}
.detail-sep{height:1px;background:var(--border)}
.section-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--amber-d);margin-bottom:6px;font-weight:500}
.keyargs-list{list-style:none;display:flex;flex-direction:column;gap:7px}
.keyargs-list li{font-size:12px;line-height:1.7;color:var(--cream-d);padding:7px 10px;background:rgba(255,255,255,.02);border-radius:5px;border-left:2px solid var(--amber-d)}
.keyargs-list li b{color:var(--cream);font-weight:500;display:block;margin-bottom:2px}
.q-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.q-list li{font-size:12px;line-height:1.7;color:var(--cream-d);padding:7px 10px;background:rgba(107,90,140,.06);border-radius:5px;border-left:2px solid #4a3a6a}
.q-list li::before{content:"Q ";color:var(--purple);font-weight:500}
.thinkers-wrap{display:flex;flex-wrap:wrap;gap:6px}
.thinker-tag{padding:3px 9px;border-radius:4px;font-size:11px;background:rgba(58,88,120,.15);border:1px solid rgba(58,88,120,.3);color:#7ab0d8}
.method-box{font-size:12px;line-height:1.7;color:var(--cream-d);padding:8px 12px;background:rgba(58,122,74,.06);border-radius:5px;border-left:2px solid var(--green);font-style:italic}
.related-wrap{display:flex;flex-wrap:wrap;gap:6px}
.related-tag{padding:3px 9px;border-radius:4px;font-size:11px;background:rgba(200,149,58,.08);border:1px solid rgba(200,149,58,.2);color:var(--amber-d);cursor:pointer;transition:all .15s}
.related-tag:hover{background:rgba(200,149,58,.15);color:var(--amber)}
.note-section textarea{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:var(--cream);font-family:'Noto Sans SC',sans-serif;font-size:12px;font-weight:300;line-height:1.7;resize:vertical;min-height:80px;outline:none;transition:border-color .2s}
.note-section textarea::placeholder{color:var(--cream-d);opacity:.4}
.note-section textarea:focus{border-color:var(--amber-d)}
.note-save-indicator{font-size:10px;color:var(--amber-d);margin-top:4px;height:14px;transition:opacity .3s}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;border-top:1px solid var(--border)}
.toggle-btn{background:none;border:none;color:var(--cream-d);font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;padding:0;font-family:'Noto Sans SC',sans-serif;font-weight:300}
.toggle-btn:hover{color:var(--amber)}
.toggle-arrow{display:inline-block;transition:transform .22s;font-size:9px}
.card.open .toggle-arrow{transform:rotate(180deg)}
.bookmark-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:0;color:var(--border);transition:color .15s}
.bookmark-btn.active{color:var(--amber)}
.grid.compact{grid-template-columns:1fr}
.grid.compact .card{flex-direction:row;align-items:stretch}
.grid.compact .card-top{width:3px;height:auto;flex-shrink:0}
.grid.compact .card-main{padding:14px 18px}
.grid.compact .card-summary{display:none}
.grid.compact .card-detail{display:none!important}
.tag-method{background:rgba(58,88,120,.25);color:#7ab0d8;border:1px solid rgba(58,88,120,.4)}
.tag-indigenous{background:rgba(58,122,74,.25);color:#7ad890;border:1px solid rgba(58,122,74,.4)}
.tag-positivism{background:rgba(122,88,32,.25);color:#d8b06a;border:1px solid rgba(122,88,32,.4)}
.tag-phenomenology{background:rgba(58,122,114,.25);color:#7ad8d0;border:1px solid rgba(58,122,114,.4)}
.tag-constructionism{background:rgba(88,88,88,.25);color:#b8b8b8;border:1px solid rgba(88,88,88,.4)}
.tag-critical{background:rgba(184,80,66,.25);color:#e89080;border:1px solid rgba(184,80,66,.4)}
.tag-feminist{background:rgba(184,80,130,.25);color:#e890b8;border:1px solid rgba(184,80,130,.4)}
.tag-crt{background:rgba(140,74,90,.25);color:#e8a0b0;border:1px solid rgba(140,74,90,.4)}
.tag-queer{background:rgba(107,90,140,.25);color:#c8a8e8;border:1px solid rgba(107,90,140,.4)}
.tag-poststructural{background:rgba(90,74,122,.25);color:#b898e0;border:1px solid rgba(90,74,122,.4)}
.tag-materialism{background:rgba(74,90,58,.25);color:#a8c878;border:1px solid rgba(74,90,58,.4)}
.tag-tourism{background:rgba(58,106,106,.25);color:#78c8c8;border:1px solid rgba(58,106,106,.4)}
.tag-leisure{background:rgba(106,80,58,.25);color:#d8a878;border:1px solid rgba(106,80,58,.4)}
.tag-neuro{background:rgba(74,140,90,.25);color:#98d8a8;border:1px solid rgba(74,140,90,.4)}
.top-method{background:linear-gradient(90deg,#3a5878,#2a4058)}
.top-indigenous{background:linear-gradient(90deg,#3a7a4a,#2a5232)}
.top-positivism{background:linear-gradient(90deg,#7a5820,#4a3210)}
.top-phenomenology{background:linear-gradient(90deg,#3a7a72,#1e3d3a)}
.top-constructionism{background:linear-gradient(90deg,#585858,#383838)}
.top-critical{background:linear-gradient(90deg,#b85042,#6a2018)}
.top-feminist{background:linear-gradient(90deg,#b85082,#6a1840)}
.top-crt{background:linear-gradient(90deg,#8c4a5a,#5a2a38)}
.top-queer{background:linear-gradient(90deg,#6b5a8c,#3d2e5a)}
.top-poststructural{background:linear-gradient(90deg,#5a4a7a,#2a1e42)}
.top-materialism{background:linear-gradient(90deg,#4a5a3a,#2a3220)}
.top-tourism{background:linear-gradient(90deg,#3a6a6a,#1e3838)}
.top-leisure{background:linear-gradient(90deg,#6a503a,#3a2e1a)}
.top-neuro{background:linear-gradient(90deg,#4a8a5a,#2a4232)}

.quotes-list{list-style:none;display:flex;flex-direction:column;gap:8px}
.quote-item{border-left:3px solid rgba(200,149,58,.4);padding:8px 12px 8px 14px;background:rgba(200,149,58,.04);border-radius:0 5px 5px 0}
.quote-text{font-size:12px;line-height:1.75;color:var(--cream-d);font-style:italic}
.quote-src{font-size:10px;color:var(--amber-d);margin-top:4px;letter-spacing:.3px}

.empty{grid-column:1/-1;text-align:center;padding:80px 0;color:var(--cream-d)}
.empty-icon{font-size:40px;margin-bottom:16px;opacity:.3}
@media(max-width:700px){header,.controls,.results-bar,.grid{padding-left:20px;padding-right:20px}.grid{grid-template-columns:1fr}.stats-bar{flex-wrap:wrap}.stat-item{min-width:80px}}
</style>
</head>
<body>
<header>
  <div class="eyebrow">个人知识体系库 · 2025</div>
  <h1 class="h-title">REC 700<br><span>研究范式 · 批判理论</span></h1>
  <p class="h-sub">哲学社会研究基础 &nbsp;·&nbsp; 认识论与方法论 &nbsp;·&nbsp; 原住民 / 女性主义 / 批判视角</p>
  <div class="stats-bar">
    <div class="stat-item"><span class="stat-n" id="sTotal">38</span><span class="stat-l">篇阅读</span></div>
    <div class="stat-item"><span class="stat-n" id="sRead">0</span><span class="stat-l">已读</span></div>
    <div class="stat-item"><span class="stat-n" id="sReading">0</span><span class="stat-l">阅读中</span></div>
    <div class="stat-item"><span class="stat-n" id="sBookmarked">0</span><span class="stat-l">已收藏</span></div>
    <div class="progress-wrap">
      <div class="progress-label"><span>阅读进度</span><span id="pPct">0%</span></div>
      <div class="progress-bar"><div class="progress-fill" id="pFill" style="width:0%"></div></div>
    </div>
  </div>
</header>
<div class="controls">
  <div class="ctrl-row1">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="srch" placeholder="搜索作者、概念、理论家、关键词…" autocomplete="off">
    </div>
    <button class="ctrl-btn" id="sortBtn" onclick="cycleSort()">排序：默认 ↕</button>
    <button class="ctrl-btn" id="viewBtn" onclick="toggleView()">紧凑视图</button>
    <button class="ctrl-btn" onclick="exportNotes()">导出笔记 ↓</button>
  </div>
  <div class="filter-row">
    <span class="filter-label">主题</span>
    <button class="pill active" data-theme="all">全部</button>
    <button class="pill" data-theme="method">方法论框架</button>
    <button class="pill" data-theme="indigenous">原住民方法论</button>
    <button class="pill" data-theme="positivism">实证主义</button>
    <button class="pill" data-theme="phenomenology">现象学</button>
    <button class="pill" data-theme="constructionism">社会建构主义</button>
    <button class="pill" data-theme="critical">批判理论</button>
    <button class="pill" data-theme="feminist">女性主义</button>
    <button class="pill" data-theme="crt">批判种族理论</button>
    <button class="pill" data-theme="queer">酷儿理论</button>
    <button class="pill" data-theme="poststructural">后结构主义</button>
    <button class="pill" data-theme="materialism">新唯物主义</button>
    <button class="pill" data-theme="tourism">旅游/去殖民</button>
    <button class="pill" data-theme="leisure">休闲研究</button>
  </div>
</div>
<div class="results-bar"><span id="rbar"></span></div>
<div class="grid" id="grid"></div>

[{"id": 1, "author": "Crotty, M.", "year": "1998", "title": "Introduction: The research process [Ch.1]. The Foundations of Social Research. SAGE.", "themes": ["method"], "summary": "厘清方法论迷宫的核心框架：将研究过程分解为方法→方法论→理论视角→认识论四个相互嵌套的层级，强调这是层级关系而非平行关系。以质性研究（建构主义→符号互动论→民族志→参与式观察）和量性研究（客观主义→实证主义→问卷调查→统计分析）为双线例证。同时处理本体论的位置争议：Crotty认为无需单独提出本体论，其他学者所谓的特定学派对社会现实的视角等价于他的理论视角层。整章的核心贡献是帮助研究者建立研究坐标系，避免方法论混乱。", "keyArgs": [{"term": "四层层级结构", "exp": "方法→方法论→理论视角→认识论。层级关系而非平行关系，每层为上一层提供逻辑基础。不可混淆层次：质化/量化是方法层的差异，不能等同于认识论层面的建构主义/实证主义对立。"}, {"term": "认识论三类型", "exp": "客观主义（objectivism）：意义独立于意识，存在于物中；建构主义（constructionism）：意义在主体与世界的互动中生成；主观主义（subjectivism）：意义由主体投射而非发现。"}, {"term": "Qual/Quant大分裂的根本错误", "exp": "质化不等于反实证主义，量化不等于实证主义。差异在认识论和理论视角层面，不在是否使用统计数据。把方法论层面的差异当成世界观/认识论层面的分裂是根本性错误。"}, {"term": "箭头方向的双向性", "exp": "可以从实践问题（方法）逆向追溯至认识论；也可从世界观（认识论）演绎至方法选择。研究者需要清楚自己在哪个方向上操作，并保持一致性。"}, {"term": "本体论的争议位置", "exp": "Crotty认为本体论不必单独提出，其他学者关于特定学派对社会现实的视角等价于他的理论视角层。这是方法论讨论中的常见分歧点，后续Wilson等人对此有进一步讨论。"}], "questions": ["在具体研究中，通常从哪个层级开始？从实践问题出发（自下而上）还是从世界观出发（自上而下）？", "方法论的独特性体现在哪里？它是否只是认识论和方法之间的翻译层？", "如果研究者无法清楚说明自己的认识论立场，这对研究的效度意味着什么？", "一个研究者可以在不同项目中使用不同的认识论立场吗？还是说世界观是一致的？"], "thinkers": ["Crotty", "Husserl", "Piaget", "Mead", "Blumer"], "method": "为整门课提供元框架。阅读任何文献时，追问：这个理论在哪个层级上运作？它的认识论前提是什么？方法的选择如何被认识论所限定？", "note": "这是建立研究坐标系的必读入门。读懂了这章，后面所有文章都有了定位工具。", "related": ["Lincoln et al 2011", "Wilson 2008", "Bennett D 2009", "Baronov 2012"], "quotes": [{"text": "A hierarchical relationship, not a parallel one — the four elements run in series: method → methodology → theoretical perspective → epistemology, with bidirectional arrows.", "src": "Crotty (1998, p.3); 笔记整理"}, {"text": "Qual: Constructivism → Symbolic Interactionism → Ethnography → Participant Observation; Quant: Objectivism → Positivism → Survey Research → Statistical Analysis. The stratification of qual/quant aspects resides within methodologies, whilst disputes over worldviews manifest within epistemology and theoretical perspectives.", "src": "Crotty (1998, pp.5–9)"}, {"text": "Ontological entanglement does not necessitate fixed pairings; Crotty contends that ontology need not be singled out — the notion of 'a particular school's perspective on social reality' espoused by other scholars is essentially equivalent to Crotty's theoretical perspective.", "src": "Crotty (1998, p.10)"}, {"text": "'Quantitative = positivism, qualitative = anti-positivism' → The error lies in treating 'methodological differences' as 'worldview divisions'. The divergence resides at the epistemological/theoretical level, not in whether statistics are employed.", "src": "Crotty (1998); 笔记整理"}]}, {"id": 2, "author": "Smith, L. T.", "year": "2012", "title": "Decolonizing Methodologies: Research and Indigenous Peoples [Introduction]. Zed Books.", "themes": ["indigenous", "method"], "summary": "从被殖民者的视角出发，系统揭示研究与帝国主义/殖民历史的深层纠缠。研究被视为知识抢夺的机制：欲望→提取→宣称所有权。知识被挪用、话语被代表、最终土地/权利/语言/生活方式被否定——研究是这一链条中的关键环节。萨义德的东方主义框架被引入，指出西方学术话语通过研究建构他者，学术机构/话语/治理共同构成殖民运作的场域。提出去殖民研究的五个核心问题，并超越批判层面，呼吁研究从解构转向更深的行动路径。", "keyArgs": [{"term": "研究即伤疤（research is a dirty word）", "exp": "原住民社区对研究有深刻的负面经历。研究与帝国主义历史缠绕：用短暂接触代表整体，这是学术傲慢与概括的暴力。研究者带走知识，主体性被剥夺。"}, {"term": "提取-代表-支配机制", "exp": "知识被抢夺，话语被代表，最终土地/权利/语言/生活方式被否定。研究是再生产这一机制的微观场域。可以理解为研究→再现→支配的三步链条。"}, {"term": "萨义德东方主义框架", "exp": "西方话语通过研究建构他者（the Other）。学术机构/话语/治理共同运作，生产关于原住民的知识，而这些知识服务于殖民利益而非原住民利益。"}, {"term": "反掠夺研究的五问", "exp": "谁的研究？谁拥有？谁受益？谁设计/执行/书写？如何传播？补充不可见标准：社区内部有哪些规则在无声运作？为何即便有内部规则，也倾向选择非原住民研究者？"}, {"term": "从批判到行动", "exp": "仅仅探索解构和历史不能改变现实。研究必须从批判层面转向更深的行动路径，包括支持原住民自我研究议程、改变知识生产的权力关系。"}], "questions": ["如何在自己的研究实践中识别隐藏的殖民逻辑？尤其是当研究者来自某种特权位置时？", "原住民社区内部的不可见标准是什么？为何有时内部规则反而倾向选择非原住民研究者？", "研究者如何在谦逊（humility）与有效行动之间找到平衡，避免研究沦为姿态表演？", "去殖民方法论与批判理论/女性主义方法论的关系：互补还是竞争？"], "thinkers": ["Smith", "Said", "Foucault", "Spivak", "Gramsci"], "method": "进入原住民社区研究时的必读前置文本。每个研究设计决策都需要经过Smith的五问检验。同时要识别自己的研究位置如何影响知识生产。", "note": "这篇文章让我重新审视自己的田野研究预设——我是否也在某种程度上复制了提取-代表-支配的结构？", "related": ["Wilson 2008", "Corntassel 2012", "Tynan 2021", "Tuck & Yang 2012", "Rosiek et al 2020"], "quotes": [{"text": "Desire, extract, claim ownership: the fruits belong to you, the subjectivity is denied to me. Knowledge is appropriated, discourse is represented, and ultimately even land, rights, language, and ways of life are negated.", "src": "Smith (2012, p.1); 笔记整理"}, {"text": "Research represents 'the whole through fleeting contact' — academic arrogance and the violence of generalisation. The Scars of Research: entangled with imperialist and colonial history.", "src": "Smith (2012, pp.1–2)"}, {"text": "Whose research? Who owns it? Who benefits? Who designs, executes, writes? How is it disseminated? Anti-predatory research.", "src": "Smith (2012, pp.10–11)"}, {"text": "Merely exploring deconstruction and history cannot alter reality; research must shift from critique towards deeper pathways for action.", "src": "Smith (2012, p.19)"}]}, {"id": 3, "author": "Wilson, S.", "year": "2008", "title": "Research is Ceremony [Ch. 1+2]. Fernwood Publishing.", "themes": ["indigenous", "method"], "summary": "提出研究即关系实践这一核心命题，要求理解研究必须理解研究者本身。将研究范式解构为本体论→认识论→公理论（axiology）→方法论四层，强调原住民研究范式不是在主流范式上添加原住民元素，而是需从自身完整的本体论出发。方法论工具与其底层信念不可分离，不能借用工具而抛弃范式前提。关系性问责（relational accountability）是原住民研究写作的核心：研究者必须对其与概念、社区的关系保持可见性和责任感。", "keyArgs": [{"term": "研究即关系实践", "exp": "不只是研究者研究社区，而是研究者作为关系网络中的一个节点，通过研究履行对关系的责任。理解我的研究，必须更深入理解我这个研究者的关系位置。"}, {"term": "原住民范式四层结构", "exp": "本体论（存在是什么）→认识论（如何知道）→公理论（什么有价值）→方法论（如何探究）。这四层在原住民范式中是有机整体，不能分拆使用。"}, {"term": "不能只是添加（add Indigenous）", "exp": "不能在主流范式里添加原住民元素就称之为原住民研究。方法论工具与其底层本体论-认识论信念相连，工具不可与范式前提分离。"}, {"term": "关系性问责（relational accountability）", "exp": "研究写作中需要对研究者-概念-社区的关系进行显性化。不是讲自己的背景，而是使这三者之间的关系结构可见：谁能说话，如何说话，对谁负责。"}, {"term": "知识归属的根本差异", "exp": "主流范式的隐含假设：知识属于个人。原住民范式：知识属于宇宙/关系网络，研究者只是诠释者而非所有者。这是认识论层面的根本分歧。"}], "questions": ["本质化范式的风险：强调原住民范式的共同性时，如何避免过度同质化多样的原住民世界观？", "从关系性问责到大学伦理委员会审查、数据治理、作者署名规范，需要哪些具体的制度框架来落地？", "当原住民研究者在主流大学体制内工作时，如何在不妥协自身范式的前提下获得资源和学术空间？"], "thinkers": ["Wilson", "Smith", "Absolon", "Kovach"], "method": "在写研究设计或论文方法论章节时，Wilson提供了一个检验标准：我是否清楚说明了我的关系性立场？我与研究概念和社区的关系是否可见？", "note": "这篇让我开始思考：作为研究者，我对谁负责？我的研究关系是什么？这不是表演性的问题，而是实质性的方法论承诺。", "related": ["Smith 2012", "Tynan 2021", "Rosiek et al 2020", "Tuck & Yang 2012"], "quotes": [{"text": "'Research is the practice of relationship.' You must understand me (the researcher) more deeply to comprehend my work.", "src": "Wilson (2008, p.7)"}, {"text": "The 'research paradigm' is deconstructed into four interrelated layers: Ontology → Epistemology → Axiology → Methodology. Indigenous research paradigm = Indigenous ontology / epistemology / axiology / methodology.", "src": "Wilson (2008, pp.33–37)"}, {"text": "It is insufficient to merely 'add' Indigenous elements to the mainstream paradigm, as methodological tools are invariably tied to their underlying beliefs — one cannot separate the tool from its paradigmatic premises.", "src": "Wilson (2008, p.42)"}, {"text": "The necessity of 'relational accountability' in research writing: making explicit the relationship between researcher–concept–community, integrating 'who can speak, how they speak, and to whom they are accountable' into methodology and ethics.", "src": "Wilson (2008, pp.77–79)"}, {"text": "The shared implicit assumption of the four mainstream paradigms is 'knowledge belongs to individuals'; whereas the Indigenous paradigm holds that knowledge belongs to the 'cosmos/network of relationships', with researchers merely as interpreters.", "src": "Wilson (2008, pp.56–58)"}]}, {"id": 4, "author": "Lincoln, Lynham & Guba", "year": "2011", "title": "Paradigmatic controversies, contradictions, and emerging confluences. In SAGE Handbook of Qualitative Research.", "themes": ["method"], "summary": "系统梳理七大范式争议，比较实证主义/后实证主义/批判理论/建构主义/参与性五大范式在七个维度上的立场差异与汇合趋势。七大争议包括：公理论（axiology）、可通约性（commensurability）、控制（control）、真理基础、效度扩展、声音/反思性/后现代文本表述。重要贡献：范式间存在汇合（confluences）而非简单对立，这种汇合特别体现在建构主义、批判理论与参与性范式之间。", "keyArgs": [{"term": "公理论（axiology）", "exp": "研究中什么构成价值？如何将灵性/神性维度纳入学术研究？Guba & Lincoln认为这是被长期忽视的范式维度。宗教/灵性在研究中的地位：如何简化宗教元素使其可被学术接纳，同时不失去其本质？"}, {"term": "可通约性（commensurability）", "exp": "不同范式间能否在哲学层面相互通约？答案是：哲学上不可通约，但方法上可兼容。向卫理公会听众提天主教问题这一比喻揭示了范式间对话的本质难题。"}, {"term": "效度扩展（extended criteria）", "exp": "各范式提出不同标准：水晶体效度（Richardson）；极性标准（Guba & Lincoln）；催化性/激进性标准（Lather）；关系性和伦理中心标准（Lincoln）；社区决定效度。"}, {"term": "声音/反思性/后现代文本", "exp": "谁有权为他者发声？反思性是否有尽头（每次反思都来自尚未被审视的立场）？后现代文本表述：研究应以何种形式呈现？这三个问题被视为当前最需要关注的核心争议。"}, {"term": "范式汇合趋势", "exp": "批判理论、建构主义、参与性范式在某些问题上出现汇合：都关注权力/声音/变革；都对价值中立科学持批判态度；都重视研究的伦理和政治维度。"}], "questions": ["反思性是否是无限循环？每次反思都始于一个尚未被检验的立场，是否存在可操作的停止点？", "公理论的操作化：如何在实际研究评估中测量研究的价值立场是否与其范式主张一致？", "范式间的汇合是真正的哲学融合，还是方法层面的临时借用？这对研究设计有何实践含义？"], "thinkers": ["Guba", "Lincoln", "Habermas", "Foucault", "Richardson", "Lather"], "method": "在自己的研究设计中，需要明确回答：我处于哪个范式框架中？我采用哪些效度标准？我如何处理声音和反思性问题？", "note": "这篇文章的范式比较表是整个研究方法论课程的视觉摘要。建议反复回看，追踪自己立场的漂移。", "related": ["Crotty Ch.1 1998", "Baronov 2012", "Bennett D 2009"], "quotes": [{"text": "Whether different paradigms can be reconciled — paradigms cannot achieve philosophical commensurability, but may be methodologically compatible. 'Posing Catholic questions to Methodist audiences.'", "src": "Lincoln, Lynham & Guba (2011, p.100)"}, {"text": "Is reflexivity finite? Or an infinite loop, where each reflection begins from a stance not yet examined? Even if we agree to shift contexts as a foundation, might heightened individuality lead to a lack of common ground?", "src": "Lincoln et al. (2011, p.116); 笔记整理"}, {"text": "Extended Criteria for Quality Assessment: (a) Crystal Line Validity (Richardson); (b) Polarity Criteria (Guba and Lincoln); (c) Catalytic, Radical, and Sensory Criteria (Lather); (d) Relational and Ethocentric Criteria (Lincoln); (e) Community-determined validity.", "src": "Lincoln et al. (2011, pp.120–122)"}, {"text": "Critical thinking exists within all paradigms. Studying paradigms does not equate to adopting positions or values. The current debate requiring most attention centres on voice, reflexivity, and postmodern textual representations.", "src": "Lincoln et al. (2011); 笔记整理"}]}, {"id": 5, "author": "Bennett, D.", "year": "2009", "title": "Positivism/positivist geography. In International Encyclopedia of Human Geography. Elsevier.", "themes": ["positivism", "method"], "summary": "批判学界将实证主义当稻草人使用的倾向，要求把对实证主义的评判放回其科学哲学语境。厘清四种不同的实证主义——孔德式实证主义、逻辑实证主义（维也纳学派）、标准科学观、实证主义态度——揭示这四者之间的历史谱系差异，不能混为一谈。重点批判地理学对实证主义的误配：把量化/空间科学直接等同于逻辑实证主义是误配；地理学对实证主义的批判主要建立在二手资料和混淆概念之上。", "keyArgs": [{"term": "四种实证主义不能混淆", "exp": "①孔德式：科学是唯一有效认识方式，追求统一科学法则；②逻辑实证主义（维也纳学派）：命题的意义=其验证方法，反形而上学；③标准科学观：科学方法的通俗化描述；④实证主义态度：泛化的客观/中立倾向。四者来源不同，主张不同，不可混同。"}, {"term": "验证原则的自指困境", "exp": "逻辑实证主义主张：只有可由公共经验检验的命题才有意义。但这句话本身可检验吗？若不可检验，则按其自身标准无意义；若可检验，需要站到语言外面去看，但做不到。罗素在维特根斯坦《逻辑哲学论》序言中早已指出这个自噬点。"}, {"term": "维也纳学派的历史政治语境", "exp": "不是纯粹的学术洁癖，而是在思想-政治冲突场域中运作：反对德国观念论与直觉特权的社会后果，把公开可检验与反威权知识政治捆绑。处于相对论、量子论等科学观转变的历史节点。"}, {"term": "地理学对实证主义的误配", "exp": "Johnston将孔德、逻辑实证主义、标准科学观混为一谈；把量化/空间科学直接等同于逻辑实证主义是误配。地理学对实证主义的批判主要依赖二手资料，这是稻草人式攻击的典型案例。"}, {"term": "稻草人批判的意义", "exp": "批评实证主义之前，必须先还原其哲学历史语境。批评必须具体：你所攻击的是哪种实证主义？在哪个历史阶段？面对什么样的他者？否则批评就是打稻草人。"}], "questions": ["批评实证主义之前，必须先交代：你所讨论的科学观处于何种历史阶段，面对什么他者？否则批评就是打稻草人。", "如何区分哲学层面、方法层面、技术层面三层面的实证主义，并分别进行评估？", "地理学或休闲研究中，哪些关于实证主义的批评是有效的，哪些属于稻草人式攻击？"], "thinkers": ["Comte", "Schlick", "Neurath", "Carnap", "Wittgenstein", "Popper", "Russell", "Johnston"], "method": "做研究时需要先确定：我在本体论和认识论的坐标位置；我如何看待真理观（对应论 vs 连贯论）；之后才能懂得什么是证据，怎么用证据。", "note": "这篇是整个实证主义讨论中最具澄清力的文章，配合Crotty第二章一起读效果最好。", "related": ["Crotty positivism 1998", "Baronov 2012", "Lincoln et al 2011"], "quotes": [{"text": "Positivism/positivist: in the past 30 years of human geography, used in a pejorative sense. We must place the judgment of 'positivism' back into its philosophical domain — science itself is not constant.", "src": "Bennett (2009, p.296)"}, {"text": "Phrased starkly: 'What does it mean to say a proposition is true?' Pushed empiricism to its limits, anti-metaphysical and anti-idealist, maintaining that knowledge only exists in the form of 'empirically verifiable propositions'.", "src": "Bennett (2009, p.299)"}, {"text": "Johnston conflated Comte, logical positivism, and standard scientific views; Gregory almost only attacked the Comtean form, based mainly on secondary sources — the result: the academic impression of 'positivism' was locked in by second-hand narratives.", "src": "Bennett (2009, p.308)"}, {"text": "When doing research, one must think about one's own coordinate position: which side of ontology and epistemology am I on? How do I view truth — correspondence or coherence? Only then can I understand what counts as evidence, and how to use it.", "src": "Bennett (2009); 笔记整理"}, {"text": "If you declare 'only verifiable sentences have meaning', is this sentence itself verifiable? If not verifiable = meaningless by its own standard; if verifiable = you must step outside language to check, which is impossible. Russell pointed out this self-consuming point in his preface to the Tractatus.", "src": "Bennett (2009, p.301); Russell引用"}]}, {"id": 6, "author": "Crotty, M.", "year": "1998", "title": "Positivism: The March of Science [Ch. 2]. The Foundations of Social Research. SAGE.", "themes": ["positivism"], "summary": "历史化实证主义的发展脉络：从孔德的统一科学方法论到逻辑实证主义的验证原则，再到后实证主义的降格主张（海森堡测不准、玻尔互补性、库恩范式转移）。厘清Positive的词源来自positive law（实定法）：意指被设定/给定的，相对于靠推理的自然法，因此positive science意味着扎根于给定之物，而非等同于量化和数学。批判性地追踪科学的自我赋权：问题不在科学做了什么，而在它自我赋予的地位（唯一真、绝对客观）。", "keyArgs": [{"term": "Positive的词源溯源", "exp": "来自positive law（实定法）——意指被设定/给定的（posited/given），相对于靠推理的自然法。因此positive science核心是以所给为起点，不可简单等同于量化和数学方法。"}, {"term": "孔德的关键贡献", "exp": "不是数学崇拜，而是方法论统一：不同学科可以共享积极科学方法。强调观察-实验-比较三步，指出单一事实与其他事实的连接性造就科学意义。"}, {"term": "逻辑实证主义验证原则", "exp": "分析命题（如2+2=4，同语反复，无事实含量）vs 综合命题（需靠经验/感觉材料验证）。形而上学、伦理、美学、宗教因不可验证而被排除出知识版图——大量人类关切（价值/伦理）因此被驱逐。"}, {"term": "后实证主义的科学降格", "exp": "海森堡测不准原则：观测改变对象，动摇确定性/客观性的绝对性。玻尔互补性：局限是本体论的。Crotty：科学知识是主动建构出来的，而非被动抄录自然法则。"}, {"term": "库恩的范式理论", "exp": "范式=一个时代的统一信念包与问题框架；正常科学是在范式内解谜式推进；异常→危机→范式转移。Crotty：科学并非温室里的理性，而是有利益和社会性的人类活动。"}], "questions": ["质化研究也可以被实证主义化（若追求客观可概化真），量化研究也可以是非实证主义的（若被当作解释/阐释）——这个框架如何改变我们对方法选择的理解？", "当代科学家更喜欢找支持而不是主动伪证（Crotty的批评），这揭示了什么关于科学实践的社会学现实？"], "thinkers": ["Comte", "Mach", "Hempel", "Kuhn", "Popper", "Heisenberg", "Bohr", "Lakatos"], "method": "为研究者提供实证主义的完整历史图谱。读完后需要定位自己：我在这个图谱的哪个位置？我是否清楚自己选择了什么，以及为什么。", "note": "", "related": ["Bennett D 2009", "Baronov 2012", "Crotty Ch.1 1998"], "quotes": [{"text": "In 'positive religion / positive law', 'positive' means 'posited / given' — relative to natural religion / natural law derived by reason. Therefore positive science = not relying on metaphysical reasoning, but grounded in what is given. Cannot be equated with quantification and mathematics.", "src": "Crotty (1998, pp.20–21)"}, {"text": "Comte: not mathematical worship, but methodological unification — different disciplines can share one positive scientific method. Emphasising observation–experiment–comparison, indicating that a single fact's connection to others creates scientific meaning.", "src": "Crotty (1998, p.22)"}, {"text": "Post-positivism: not 'quantitative vs qualitative'. Qualitative can also be positivist (if it claims objective generalisable truth), and quantitative can be non-positivist (if taken as interpretation). Researchers need to declare their stance: what is your understanding of meaning/reality?", "src": "Crotty (1998, pp.40–41); 笔记整理"}, {"text": "Kuhn: paradigm = a unified belief package of an era; normal science advances by puzzle-solving within the paradigm; anomalies → crisis → paradigm shift. Science is not 'reason in a greenhouse' but a human activity with interests and social dimensions.", "src": "Crotty (1998, p.38)"}]}, {"id": 7, "author": "Baronov, D.", "year": "2012", "title": "Postpositivism [Ch. 3]. Conceptual Foundations of Social Research Methods. Paradigm Publishers.", "themes": ["positivism"], "summary": "系统介绍后实证主义：从绝对真理到近似真理的认识论转变。区分三个内部流派：晚期逻辑实证主义者、批判悲观派（埋葬实证传统）、批判乐观派（救赎实证传统）。当前社会科学主流基调：晚期逻辑实证主义+乐观派改造。系统介绍D-N（演绎-法则）模型、法则特征、因果概念的经验主义处理，以及后期维特根斯坦语言游戏对逻辑实证主义的结构性冲击。", "keyArgs": [{"term": "D-N（演绎-法则）模型", "exp": "Hempel & Oppenheim：社会科学也应以一般法则+演绎来解释与预测。法则要求：普遍陈述，不同于偶然事实；若A则B的检验形式。例：人性逐利→福利慷慨→不工作的政策逻辑。但前提隐含了价值判断，这是内在问题。"}, {"term": "因果的经验主义处理", "exp": "在经验主义约束下，因果不可被直接观察，只能当作不变联系（invariable sequence）。社会科学多是充分关系而非必要关系。局限：忽略机制层级，是否混淆了机制与条件？"}, {"term": "后期维特根斯坦的冲击", "exp": "语言游戏（language games）：词义取决于使用情境，不存在普遍语义。这构成对逻辑实证主义的结构性冲击——因为逻辑实证主义的验证原则本身需要一种通用描述语言，而这是不存在的。"}, {"term": "可错论（fallibilism）", "exp": "乐观派立场：承认知识有限但进步仍然可能；多元理性与可错论；确认不等于理性抉择，理性是让竞争主张相互答辩，暂时的优解。这与Popper的证伪主义有内在联系。"}, {"term": "社会-文化嵌入性", "exp": "研究议题的提出、研究结果的呈现与使用，都被价值与利益塑形。如何设计防偏机制？如何区分更真与更强势的胜出？这是乐观派需要进一步解答的问题。"}], "questions": ["共同准绳（common yardstick）如何避免被强势群体垄断？这是可错论的核心政治问题。", "如何区分知识的真正进步与强势立场的胜出？在社会科学中，这条线在哪里？", "经验概括会不会使得理论走向碎片化，无法形成有解释力的整体框架？"], "thinkers": ["Hempel", "Oppenheim", "Carnap", "Nagel", "Popper", "Wittgenstein", "Kuhn", "Toulmin"], "method": "了解后实证主义后，在阅读量化研究时要问：这项研究的法则主张是普遍的还是情境性的？其因果叙述是否混淆了机制与条件？", "note": "", "related": ["Crotty positivism 1998", "Bennett D 2009", "Lincoln et al 2011"], "quotes": [{"text": "Hempel & Oppenheim: social science should also use general laws + deduction to explain and predict. E.g., human self-interest → leisure preference → generous welfare → not working. But the premise implicitly contains value judgments.", "src": "Baronov (2012, p.52)"}, {"text": "Wittgenstein's language games: word meanings depend on context of use, there is no universal semantics — a structural shock to logical positivism, because its verification principle itself requires a universal descriptive language, which does not exist.", "src": "Baronov (2012, p.61)"}, {"text": "Fallibilism (critical optimists): knowledge is limited but progress is possible. Rationality is making competing claims answer to each other; what we get is a temporary best solution, not certainty. How do we distinguish a genuinely better answer from a merely stronger one?", "src": "Baronov (2012, pp.67–68)"}]}, {"id": 8, "author": "Moran, D.", "year": "2000", "title": "Introduction to Phenomenology [Introduction]. Routledge.", "themes": ["phenomenology"], "summary": "现象学作为哲学实践方式（zu den Sachen selbst——回到事物本身）的系统导论。梳理胡塞尔的核心概念（意向性/悬置/还原/给予性/生活世界），Heidegger的三重断裂（历史性/事实性/时间性，解释学优先，反egology），以及Sartre、梅洛-庞蒂、Levinas、Derrida的延伸方向。Moran的贡献在于：将现象学呈现为家族相似性实践而非统一教义，强调其内部张力和发展脉络，批判将现象学误读为主观内省主义。", "keyArgs": [{"term": "意向性与Noesis-Noema结构", "exp": "脑子里不可能空转：只要在想/看/怕/记，就一定是在想某个东西，把它当成某种样子。意向行为（noesis）指向意向相关物（noema）。先看（看到什么），再考虑其真实性——这与实证主义的观察顺序形成张力。"}, {"term": "悬置（Epoché）与给予性", "exp": "给予性：经验以某种方式被给予（modes of givenness）。悬置：暂停自然态度，像陪审团被要求只看台面上的证据，不采信庭外信息。现象学任务是描述这些给予方式，只就其如何被给到来加以接纳。"}, {"term": "Heidegger的三重断裂", "exp": "①历史性/事实性/时间性：人不只有内在时间意识，还有身世背景、既定处境、面向未来；②解释学优先：纯粹中性描述是幻象，我们总有前理解；③Anti-egology：从意识学转向此在（Dasein）的在世存在（Being-in-the-world）。"}, {"term": "梅洛-庞蒂的身体意向性", "exp": "身体本身就带着朝向某物的指向性：运动性就是原初意向性（la motricite est l'intentionnalite originaire）。知觉行为和所处环境相互依存、彼此嵌入。人和世界是交错相连的关系，解不开的互相缠结。"}, {"term": "Levinas的伦理化现象学", "exp": "不是我如何把世界当作对象，而是他人如何先来要求我。伦理先于存在论。陌生人突然不适，下意识起身搀扶——这个被召唤的瞬间不是先认知再计算，而是一种先行的责任关系在动。"}], "questions": ["Epoché在实际操作层面能真正实现吗？意识离不开其意向相关物，总是裹挟在世界里，这是否使纯粹的先验还原成为不可能？", "现象学与维也纳学派的根本张力：前者描述意向结构的给予性，后者要求可验证命题。这两种知识取向能对话吗？", "Derrida如何通过差延动摇现象学作为方法的稳定性？这对质性研究的方法论基础意味着什么？"], "thinkers": ["Husserl", "Heidegger", "Sartre", "Merleau-Ponty", "Levinas", "Derrida", "Brentano"], "method": "现象学方法论的核心贡献：提供了一种描述经验结构的方式，关注主观性如何参与使客观性成立。这对访谈研究和现象学质性方法有直接意义。", "note": "现象学不是内省主义——它研究如何被给予的严格描述，而不是沉溺于主观感受。", "related": ["Burr 1995", "Crotty Ch.1 1998", "Bennett J 2010"], "quotes": [{"text": "Zu den Sachen selbst — back to the things themselves. Phenomenology is not a unified doctrine, but a family of similar practices 'following the things themselves'. It retains subjectivism at the core of epistemology and worldview: objectivity-for-subjectivity.", "src": "Moran (2000, p.4)"}, {"text": "Noesis–Noema: the mind cannot 'run idle' — whenever thinking, seeing, fearing, remembering, one is necessarily about something, taking it as something. See first, then consider whether it is real.", "src": "Moran (2000, p.14)"}, {"text": "Epoché: like a jury instructed to temporarily disregard information outside the court, only looking at the evidence on the table; combined with eidetic and transcendental reduction to pull out the structure and elements of the phenomenon being studied.", "src": "Moran (2000, p.12)"}, {"text": "la motricité est l'intentionnalité originaire — motility is originary intentionality (Merleau-Ponty). The body itself carries a basic directionality 'toward something'. Perception and environment are mutually dependent, entwined together.", "src": "Merleau-Ponty, cited in Moran (2000, p.416)"}, {"text": "'It is a matter of describing, not of explaining or analysing ... [this] is from the start a foreswearing of science.' Science is a second-order expression built upon direct experience.", "src": "Merleau-Ponty, Phenomenology of Perception, Preface; cited in Moran (2000)"}, {"text": "Levinas: not 'how I take the world as an object', but 'how the other comes to demand of me first'. Ethics before ontology. That moment of being-called — early morning on the subway, a stranger suddenly unwell, you instinctively rise to help — this is not cognition then calculation, but a prior responsibility relation already at work.", "src": "Levinas, cited in Moran (2000); 笔记整理"}]}, {"id": 9, "author": "Burr, V.", "year": "1995", "title": "What is Social Constructionism? [Introduction]. Routledge.", "themes": ["constructionism"], "summary": "社会建构主义的家族相似逻辑：以四个关键假设（批判习以为常的知识/历史文化特定性/知识由社会过程维系/知识-行动同构）作为松散但可识别的共同特征。梳理从Mead的互动论、Berger & Luckmann的社会现实建构，到Gergen的北美传统和Foucault-话语心理学的英国传统。核心认识论立场：知识不是直接照见世界的镜子，而是在人际互动（尤其是语言实践）中协商出来的，因此是历史性的和可变的。", "keyArgs": [{"term": "四个关键假设（家族相似特征）", "exp": "A.批判习以为常的知识：反对认为客观无偏的观察能直接揭示世界本性；B.历史文化特定性：当下常识带时间戳和文化坐标；C.知识由社会过程维系：日常互动就是共同版本的知识被制造/维持的过程；D.知识-行动同构：不同的建构引导不同的行动/政策。"}, {"term": "反本质主义与反实在主义", "exp": "反本质主义：没有写死在人或事物里的固定本质；我们看到的样子，多是社会过程塑出来的。反实在主义：知识不是直接照见世界；我们在人际互动中建构出各自版本的现实。这不是否认差异存在，而是强调差异的制度化是社会过程的结果。"}, {"term": "语言即行动", "exp": "说话不只是表达内心，而是在做事：定位、承诺、归责、召唤、划界。话语心理学（Potter, Wetherell等）：账目（accounts）是为实现社会目标而建构的，而非对内心事件的被动再现。"}, {"term": "Berger & Luckmann的三步", "exp": "外化（externalisation）：人把想法/做法推出去成为公共对象；客观化（objectivation）：这些说法/物件进入公共领域被反复转述，变成独立于个人的客观现实；内化（internalisation）：后来者出生在已有的世界里，把它当自然，内化为自己的理解。"}, {"term": "真理等于稳定下来的共同版本", "exp": "我们当下视为真的东西是社会互动的产物，而不是对世界客观观察的产物。它随历史/文化而变。改变话语/定义，就是改变政策工具。"}], "questions": ["宽口径定义（家族相似逻辑）的代价：边界模糊，容易被批评什么都能算建构，实证可检性下降。这是致命缺陷还是有意的理论开放性？", "如何区分话语建构与生物/物质现实？社会建构主义如何处理身体疾病、物理障碍等不能被话语完全解构的现实？", "后现代/后结构主义倾向拆解一切大叙事——这是否有动摇女性主义、批判理论的政治锋利度的风险？"], "thinkers": ["Gergen", "Mead", "Berger", "Luckmann", "Potter", "Wetherell", "Foucault", "Wittgenstein", "Harre"], "method": "社会建构主义为话语分析、会话分析、叙事分析、民族志等方法提供认识论基础。关键操作：把研究对象从实体转向过程——不问X是什么，而问X是如何被做出来的。", "note": "", "related": ["Moran 2000", "Berbary 2017", "Crotty Ch.1 1998"], "quotes": [{"text": "Social constructionism has no unified definition; it is a collection of family resemblances. Four key assumptions: (A) critical stance toward taken-for-granted knowledge; (B) historical and cultural specificity; (C) knowledge is sustained by social processes; (D) knowledge and social action go together.", "src": "Burr (1995, pp.3–5)"}, {"text": "'Truth' = a stable, shared version (changeable). What we currently regard as 'true' is a product of social interaction, not purely objective observation of the world. Changing discourse/definitions is changing policy tools.", "src": "Burr (1995, p.7)"}, {"text": "Language as social action: speaking is not only 'expressing the inner', but doing things: positioning, committing, attributing, summoning, demarcating. Accounts are constructed to achieve social goals, not passive re-presentations of 'inner events'. Nothing outside the text.", "src": "Burr (1995, pp.9–10); Potter & Wetherell"}, {"text": "Berger & Luckmann: externalisation → objectivation → internalisation. Those born later enter a ready-made world, take it as natural, internalise it as their own understanding.", "src": "Berger & Luckmann (1966), cited in Burr (1995, p.13)"}]}, {"id": 10, "author": "Crotty, M.", "year": "1998", "title": "Critical Inquiry [Ch. 6 & 7]. The Foundations of Social Research. SAGE.", "themes": ["critical"], "summary": "批判性研究从理解走向质疑/挑战/促成变革：情境不再是互动/共同体，而是冲突/压迫。系统介绍马克思的基础-上层建筑结构、意识形态批判与劳动异化理论，到法兰克福学派（Horkheimer的传统vs批判理论区分、Adorno的否定辩证法），再到Habermas的三类认识利益和交往行为理论，最后是Freire的解放教育（conscientização）。批判理论的规范性基础不靠超越形而上学的价值，而靠日常语言的必然预设。", "keyArgs": [{"term": "传统理论vs批判理论（Horkheimer）", "exp": "传统理论：反映和再现现实，服务于现状；批判理论：改变现实，揭露意识形态，避免理论蜕变为意识形态的辩护工具。这一区分是法兰克福学派的核心立场宣言。"}, {"term": "劳动异化（Entfremdung）", "exp": "自我异化：劳动成为谋生手段而非自我实现；物的异化：劳动产品与生产者分离成为对立力量；人与人的异化：前两种异化外溢为社会关系的敌对化。把个体困境回接到劳动过程与社会关系的结构分析。"}, {"term": "Adorno的否定辩证法", "exp": "对同一化思维的总攻：反对把他者同一化为自我，反对用概念完全捕获现实。通过概念的星丛（constellation）来照亮对象，而非用单一概念定义对象。放弃对世界彻底掌控的欲望。"}, {"term": "Habermas的三类认识利益", "exp": "技术兴趣→经验-分析科学（控制自然）；实践兴趣→历史-诠释科学（相互理解）；解放兴趣→批判科学（精神分析/意识形态批判，实现自我反思与解放）。三类利益不可化约，解放兴趣不能被技术理性吞并。"}, {"term": "Freire的conscientização", "exp": "解放教育：Problem-posing（提出问题）与去神话化。废除师生二分：研究与教学合一；反思-行动-再反思（praxis）的持续实践。沉默文化：被压迫者内化压迫者形象。"}], "questions": ["社会研究如何在不自觉中复制统治阶级的意识形态？如何设计能够揭示而非掩盖这种复制的研究？", "Adorno的否定辩证法是否使批判理论陷入纯粹的否定而无法提供建设性方向？这是否是其内在局限？", "Freire的解放教育在高度消费主义/数字化的社会中如何落地？解放的第一步是什么？", "批判理论的解放承诺：谁来判断什么是真正的解放？这是否会产生新的精英主义？"], "thinkers": ["Marx", "Engels", "Horkheimer", "Adorno", "Habermas", "Marcuse", "Benjamin", "Freire"], "method": "田野和文本分析需要连接回支配/剥夺的结构。可以建立意识形态/话语编码本：谁被静音？哪些概念将结构问题个体化？", "note": "革命性的社会变革作为研究目标——这是否与学术的客观性要求根本冲突？", "related": ["Melamed 2015", "Bailey et al 2023", "hooks 1991", "Ladson-Billings 1998", "Berbary forthcoming"], "quotes": [{"text": "Traditional theory reflects and reproduces reality, while critical theory changes reality. Theory risks becoming a tool of ideology — critical theory must avoid this denaturing.", "src": "Horkheimer (1937); cited in Crotty (1998, p.152)"}, {"text": "Alienated labour: labour becomes a means of making a living rather than self-realisation; the alienation of the object; the alienation of people from each other — spills over into hostility in social relations; total dehumanisation: the proletariat are 'stripped even of the appearance of being human'.", "src": "Marx; cited in Crotty (1998, pp.154–155)"}, {"text": "Habermas — Knowledge and Human Interests (1968): human experience is guided by cognitive interests corresponding to technical, practical, and emancipatory knowledge/action. The normative basis of critical theory lies not in transcendent metaphysical values, but in the necessary presuppositions of everyday language.", "src": "Habermas (1968); cited in Crotty (1998, p.157)"}, {"text": "Freire: Conscientização — problem-posing and demythicisation. Generating intersubjective dialogue and joint action. Reflection and praxis: the oppressed internalise the image of the oppressor — the 'culture of silence'.", "src": "Freire; cited in Crotty (1998, p.166)"}, {"text": "Social research can unknowingly replicate the ideology of the ruling class. Materials disposal: building an ideological/discourse codebook — who is silenced? Which concepts individualise structural problems?", "src": "Crotty (1998, p.158); 笔记整理"}]}, {"id": 11, "author": "Tynan, L.", "year": "2021", "title": "What is relationality? Indigenous knowledges, practices and responsibilities with kin. Cultural Geographies, 28(4).", "themes": ["indigenous"], "summary": "以第一人称探究关系性（relationality）作为原住民知识实践核心的本体论意义：关系不能被提取或时间限制。All things are kin。土地、天空、火、水都是关系存在，不是资源或分析对象。反对extractivism：研究不应追求效率而提取，原住民不应成为被收割的对象。知识主权问题：谁受益、如何共同作者、谁持有叙事权力和数据/知识主权。拆解专家化：大学训练本身构成提取主义，制度改革路径依然不足。", "keyArgs": [{"term": "关系性作为生命力", "exp": "原住民关系性被视为生命力（life force）：支持并滋养生命。不是分析工具，而是存在方式本身。关系性视角连接而非分类——与他者连接的首要性：你与谁以及与什么地方相连？"}, {"term": "他者化切断原初连接", "exp": "当人与物成为他者（the Other），就切断了原初连接——这是去人化（dehumanisation）的过程。人类与万物是一体，Caring as Country。天空中的仪式/凝望是桥接实践；火的照护是关系实践。"}, {"term": "守护关系（stewardship）", "exp": "将自然视为亲属而非资源。守护是伦理关系，带有互惠-责任-原住民性三位一体的义务。知识的获取必须回应这种守护关系，否则就是提取主义。"}, {"term": "知识主权的四问", "exp": "谁受益（who benefits）？如何共同作者（how do we co-author）？谁持有叙事权力（who holds narrative power）？谁持有数据/知识主权（data/knowledge sovereignty）？这四个问题应内嵌于任何涉及原住民社区的研究设计。"}, {"term": "拆解专家化", "exp": "大学训练方法本身构成一种提取主义。知识主权、关系必须被纳入仪式、必须被实践。制度改革路径至今仍不充分。"}], "questions": ["关系性是现实本身吗？从本体论视角，这不是经验结论而是形而上前提——关系与现实是否有可区分的边界？", "责任和义务是关系性的核心，但性别化和代际性负担未被充分处理——如何避免在强调集体责任时道德化女性和长者的无偿照护劳动？", "大学研究体制与关系性原则之间的张力如何解决？是否只能在体制内找到有限的实践空间？"], "thinkers": ["Tynan", "Dudgeon", "Bray", "Young"], "method": "在涉及原住民社区的田野研究中，关系性问责不只是伦理表态，而是研究方法的核心承诺。需要预先设计知识主权的归属和数据主权的保护机制。", "note": "", "related": ["Wilson 2008", "Smith 2012", "Kimmerer 2013", "Rosiek et al 2020"], "quotes": [{"text": "Dudgeon and Bray explain that 'Indigenous relationality is recognised as the life force, and that which supports and nourishes life'. All things are kin. The relational perspective connects rather than categorises. To whom and to what place are you connected?", "src": "Dudgeon & Bray, cited in Tynan (2021, p.599)"}, {"text": "Relationships cannot be extracted or time-bound. To research within relationships requires setting aside temporal scales. When people and things become the Other, it severs original connections — dehumanisation.", "src": "Tynan (2021, p.600)"}, {"text": "Consider: Who benefits? How do we co-author? Who holds narrative power and data/knowledge sovereignty? Indigenous peoples must not become objects to be harvested. Research must not pursue so-called efficiency at the expense of quality.", "src": "Tynan (2021, p.605)"}, {"text": "Recognise that university training methods constitute extractivism; institutional reform pathways remain inadequate. Indigenous culture and intellectual property: relationships must be gathered into ritual, must be practised.", "src": "Tynan (2021, p.607)"}]}, {"id": 12, "author": "Kimmerer, R. W.", "year": "2013", "title": "Braiding Sweetgrass [Selected excerpts]. Milkweed Editions.", "themes": ["indigenous"], "summary": "科学x传统知识x个人叙事的编结（braiding）：不是简单的相加，而是像编辫子一样需要对拉的张力。核心命题：Name vs Song——命名（科学分类）是开始，不是终点；歌代表故事/用法/关系/礼仪，是关系性知识的完整形态。Two-Eyed Seeing（双眼看世界）跨知识伦理：科学有效但窄（只用mind-body两维度），需要四重认知（mind-body-emotion-spirit）的完整性。人与植物的相互照亮（reciprocity of radiance）。", "keyArgs": [{"term": "编辫子隐喻（braiding）", "exp": "需要三股，需要对拉的张力：科学x传统知识x个人叙事。互惠（reciprocity）是整个认识论框架的伦理核心：不是单向的提取，而是相互给予。向读者提出参与式邀请——阅读本身被重新定义为一种关系实践。"}, {"term": "Name vs Song", "exp": "命名（scientific taxonomy）只是关系的开始，不是终点。歌（song）代表故事、用法、关系、礼仪——一种关系性的、历时性的知识形态。知识的厚度来自与地方的长期互惠，而非只在实验室的去关系化分析。"}, {"term": "两种美的认识论", "exp": "科学能解释注意力为何被抓取（互补色、后像、蜜蜂视觉与授粉机制），但若把情感与灵性排除，就看不见美的意义。机制之美（功能性）vs 关系之美（伦理性）：二者并非互斥，而是互补的认识层次。"}, {"term": "Two-Eyed Seeing", "exp": "一只眼看西方科学（有效但窄），另一只眼看原住民传统知识（关系性、整体性）。四重认识（mind-body-emotion-spirit）vs 科学的双维度（mind-body）。单通道认识的局限：只用科学，容易把名（name）当终点，听不到歌（song）。"}, {"term": "互惠作为行动伦理", "exp": "不是被动欣赏，而是以实践回应：写作/教学/修复生态/改变制度。植物的reciprocity：彼此的光辉照亮彼此的美。行动上的回礼（gifting back）是这种互惠的实践形态。"}], "questions": ["科学的解释力与传统知识的关系性能否真正编结，还是永远存在根本性张力？编辫子只是一个美好的隐喻，还是可操作的方法论？", "方法可以多元（两只眼睛看），但世界究竟是一个（共同地球）还是多个（多元本体）？这个张力如何解决？", "如何在研究实践中实践Two-Eyed Seeing而不将传统知识降格为对科学的点缀/装饰？"], "thinkers": ["Kimmerer", "Ermine", "Battiste", "Cajete"], "method": "在研究设计中，问自己：我只用了哪只眼睛？哪些知识形态被我排除了？如何在保持科学严谨性的同时纳入关系性知识？", "note": "Sweetgrass的嗅觉记忆：科学分类（名）与原住民语言（歌）两种知道的方式——这个对比在实验室和田野之间产生了巨大的认识论落差。", "related": ["Wilson 2008", "Tynan 2021", "Hockert 2020", "Rosiek et al 2020"], "quotes": [{"text": "Sweetgrass, olfactory: two ways of 'knowing' — scientific classification and Indigenous language. Braiding requires tension between strands. Reciprocity is the ethical core. Reading is redefined as a relational practice, not one-way reception.", "src": "Kimmerer (2013); 笔记整理"}, {"text": "Name vs Song: naming is the beginning, not the end; 'song' represents story, use, relationship, ceremony. The depth of knowledge comes from long-term reciprocity with a place, not just de-relationalised laboratory analysis.", "src": "Kimmerer (2013, pp.35–37)"}, {"text": "Two-Eyed Seeing: four-fold knowing (mind–body–emotion–spirit) vs. science's two-dimensional approach (mind–body). Science is effective but narrow; if emotion and spirit are excluded, the meaning of beauty and the relationship between humans and plants become invisible.", "src": "Kimmerer (2013, pp.48–50)"}, {"text": "The limitation of single-channel knowing: using only mind–body to read the world, one easily mistakes 'name' for the endpoint, unable to hear the 'song'. Action as reciprocity: not passive appreciation, but responding in practice.", "src": "Kimmerer (2013, pp.52–53); 笔记整理"}]}, {"id": 13, "author": "Corntassel, J.", "year": "2012", "title": "Re-envisioning resurgence: Indigenous pathways to decolonization. Decolonization: Indigeneity, Education & Society, 1(1).", "themes": ["indigenous"], "summary": "区分两条截然不同的路径：①国家认可的自治——资金/KPI/项目/指标驱动，是制度改革逻辑；②土地与关系根植的复兴——从日常实践中涌现，强调责任先于权利。核心命题：可持续自决（sustainable self-determination）是关系的持续再生产，需要语言活力/代际传承/食物/土地/时间分配等维度的综合再生。代际传承（Generation after generation!）是最强调的核心。", "keyArgs": [{"term": "两条路径的根本差异", "exp": "路径一：国家认可的自治——与国家谈判，获得资金和制度认可，但被KPI/绩效/项目目标所捕获；路径二：土地与关系根植的复兴——不是等待国家许可，而是从日常实践出发，恢复语言/仪式/记忆/历史/叙事/领土。"}, {"term": "可持续自决的核心要素", "exp": "语言活力；代际传承与支持；食物/土地/时间分配；关系的持续再生产（不是一次性成就，而是每一代都要不断再生产）。语义转换：从权利（rights）到责任（responsibilities）。"}, {"term": "四个陷阱（pitfalls）", "exp": "①咨询（consultation）不等于同意（consent）；②表演（performance）胜过生计（livelihood）；③社区叙事被他人（NGOs/专家）操控；④冲突被治理化，主权/土地回收被搁置。这四个陷阱使表面上的复兴运动被系统吸收。"}, {"term": "代际责任的中心性", "exp": "Generation after generation! 是文章中最强调的概念。复兴不是单代人的成就，而是需要建立跨代际的传承机制。这意味着什么样的研究时间尺度？如何触发和调整机制？"}, {"term": "回归根本文化", "exp": "不是宏大的政治叙事，而是回到自己的根（土地）。建立向外的横向网络，但不牺牲自身利益。关系-生态-文化是一体的，评估标准强调可持续性和可再生性。"}], "questions": ["复兴（resurgence）是否等于去殖民化（decolonization）？两者关系是否存在层级？", "当责任取代权利成为核心框架时，是否存在道德负担化的风险：尤其当资源稀缺时，谁来承担结构性成本？这个成本是否不成比例地落在女性和长者身上？", "微观复兴实践（日常语言/食物/仪式）如何转化为宏观维度（土地归还/财政资格/权利分配）？"], "thinkers": ["Corntassel", "Simpson", "Alfred", "Coulthard", "Fanon"], "method": "去殖民研究不只是方法问题，而是本体论-伦理-政治的综合承诺。研究者需要反思：我的研究时间框架是否匹配代际变化的尺度？", "note": "Generation after generation！——这四个叹号是文章中最有力量的时刻。", "related": ["Smith 2012", "Wilson 2008", "Tuck & Yang 2012", "Bigby et al 2022", "Agbo & Grimwood 2024"], "quotes": [{"text": "Distinguishing pathways: 1) nationally sanctioned self-governance — funding, KPIs, projects, targets; 2) land- and relationship-rooted revival: emerging from daily practice, emphasising responsibility over rights/entitlement.", "src": "Corntassel (2012, p.88)"}, {"text": "Four pitfalls: 1) consultation ≠ consent; 2) performance trumps livelihood; 3) community narratives manipulated by others (NGOs and experts); 4) conflicts 'governance-ised', sovereignty/land reclamation shelved.", "src": "Corntassel (2012, p.92)"}, {"text": "Generation after generation!!!!! — the continuous reproduction of relationships: linguistic vitality, intergenerational support and transmission, food, land, time allocation. Greater emphasis on strengthening relationships rather than budgetary strength.", "src": "Corntassel (2012, p.95); 笔记强调"}, {"text": "The semantic shift from rights to responsibilities: the ethics of responsibility as the foundation. Relationship–Ecology–Culture: one entity. Metrics emphasise sustainability and reproducibility.", "src": "Corntassel (2012, pp.97–98)"}]}, {"id": 14, "author": "Bigby, B.C., et al.", "year": "2022", "title": "Place-based governance in tourism. In The Local Turn in Tourism. Channel View.", "themes": ["tourism", "indigenous"], "summary": "探讨地方性治理（place-based governance）如何将原住民本体论和认识论融入旅游研究与实践。介绍地方性合作探究方法论（place-based cooperative enquiry），通过隐喻和意象探索英语二元对立，指出地理景观具有叙事性和活力。批判旅游增长模式：在新自由主义/消费主义框架下，旅游构成剥削，需要去增长（degrowth）+去殖民的双重转向。提出原住民经济的可持续性与互惠原则作为替代路径。", "keyArgs": [{"term": "扩展认识论（extended epistemology）", "exp": "Wooltorton等：使用包含关系本体论的扩展认识论，其中知者与所知相连接。知者与所知不可分离——这是对实证主义客观性原则的根本挑战。"}, {"term": "旅游即地方性缺失", "exp": "旅游助长无地方性（placelessness）的创造：游客的流动性破坏了地方的意义密度。原住民语言通过命名和表达展现景观活力，而旅游体验倾向于将地方去语境化、商品化。"}, {"term": "原住民经济的核心原则", "exp": "可持续性（sustainability）与互惠（reciprocity）：土地与灵性世界的相互交换。这不只是环境保护话语，而是本体论层面的互惠关系——土地是有能动性的存在，而非人类经济活动的背景。"}, {"term": "去增长+去殖民双重转向", "exp": "批判旅游增长模式下的新自由主义/消费主义逻辑（这构成剥削）。替代方案：小规模生产+合作消费网络+多中心互联。去增长与去殖民不是两个独立议题，而是相互内嵌。"}, {"term": "地方嵌入性的治理哲学", "exp": "本地治理哲学与工具；人本中心；价值发展。地方嵌入（local embeddedness）+复数路径（plural pathways）：不强制一种模板，允许不同地方发展适合自身的治理方式。"}], "questions": ["如何应对大量多重归属（multiple affiliations）和弱联系（weak ties）对地方嵌入性治理的挑战？", "当社会经济概念（如互惠、可持续）进入项目-绩效-审计语境时，如何防止被主流发展话语重新管理？", "数字化是否应介入原住民社区治理？平台化的治理逻辑与地方嵌入性治理的原则是否根本冲突？"], "thinkers": ["Wooltorton", "Higgins-Desbiolles", "Bigby"], "method": "旅游研究中的去殖民转向需要方法论和认识论层面的同步调整：不只是研究原住民旅游，而是从原住民本体论出发重新理解旅游的存在论地位。", "note": "想起巴塞罗那居民对旅游的抵制——这是否就是地方嵌入性治理原则在欧洲语境中的体现？", "related": ["Corntassel 2012", "Agbo & Grimwood 2024", "Stinson et al 2022", "King et al 2023"], "quotes": [{"text": "A methodology of place-based cooperative enquiry (Wooltorton et al., 2020): 'uses an extended epistemology inclusive of a relational ontology, in which knower and known are connected' (2020: 920).", "src": "Wooltorton et al. (2020: 920), cited in Bigby et al. (2022, p.38)"}, {"text": "Indigenous languages demonstrate vitality through naming and expression, fostering modes of narrative, poetry and storytelling. Tourism contributes to the creation of the placeless and placelessness.", "src": "Bigby et al. (2022, pp.40–41)"}, {"text": "The key principles of Indigenous economies — sustainability and reciprocity: the mutual exchange between the land and the spiritual world. Critique tourism growth models under neoliberal/consumerist frameworks. This constitutes exploitation. Degrowth + decolonisation.", "src": "Bigby et al. (2022, pp.44–45)"}]}, {"id": 15, "author": "Hockert, E.", "year": "2020", "title": "On scientific fabulation: Storytelling in the more-than-human world.", "themes": ["indigenous", "poststructural"], "summary": "提出科学寓言（scientific fable）的概念：不是科幻小说，而是将科学与人文资源并用、理解多物种世界的真实方法。核心方法论姿态是Additive empiricism：不急着消除矛盾或给出答案，而是放慢（slow down）、并置（juxtapose）、增添多声部，让更多声音被听见。批判亚里士多德式开端-冲突-宣泄结构，倡导open-ended叙事：把叙事当作与问题长期共处的练习，而非寻找终点。", "keyArgs": [{"term": "Additive empiricism vs 减法逻辑", "exp": "减法：快速消除矛盾，提炼确定性结论；加法：放慢、并置、增添多声部，让更多声音被听见。方法论姿态——慢下来、复杂化、犹疑。这不是缺乏判断，而是一种伦理性的谦卑。"}, {"term": "创伤叙事的双重风险", "exp": "毁灭和绝望的框架会打击人的安全感和连结感，可能导致公众瘫痪而非行动。同时，童话式的简单善恶二元化会遮蔽生态危机的真实复杂性。需要在创伤承认和行动动员之间找到叙事平衡。"}, {"term": "原住民叙事实践", "exp": "故事延续知识和关系；多声部、多样性本身就是伦理；关系本体论扩展到包括动物、植物、岩石。Haraway的多物种叙事：科学寓言需要去二元善恶化，保留陌生性和多声部。"}, {"term": "拒绝亚里士多德式封闭结尾", "exp": "生态危机中不存在明确的终点。因果关系是盘根错节的，不能用一次性终点掩盖这种复杂性。把叙事当作与问题长期共处的练习，注意力集中在持续的关系与care中。"}, {"term": "Melancholy作为生产性起点", "exp": "Glissant/Fanon：从伤痛处开始，把历史之痛转化为生产性的开端。Haraway：与麻烦共处（staying with the trouble）。Partial/Plural/Pragmatic/Participatory四P原则。"}], "questions": ["当前符号消费和故事简化（社交媒体字数限制、趣味化叙述）会不会反向影响我们想通过叙事唤醒认知的努力？", "Additive empiricism如何避免什么都纳入、但缺乏判断的相对主义？实践上如何设定纳入/排除标准？", "多物种叙事框架如何应用于藏族地区研究（人-动物-自然的共存关系）？"], "thinkers": ["Haraway", "Zylinska", "Despret", "Spivak", "Levinas", "Glissant", "Fanon"], "method": "在自己的定量研究发现基础上，叙事/故事可以成为传达气候/环境关切的有力补充。纯数据无法动员关切，需要通过共情和复杂叙事唤醒认知。", "note": "在关于球迷群体亲环境行为的定量研究发现中，叙事是必要的切入点，但故事疲劳（story fatigue）也是真实的障碍。", "related": ["Kimmerer 2013", "Rosiek et al 2020", "Bennett J 2010", "Tuck & Yang 2012"], "quotes": [{"text": "Additive empiricism vs. subtraction: not rushing to eliminate contradictions or provide answers, but slowing down, juxtaposing, adding multiple voices, allowing more voices to be heard. Worlding practice — methodological stance: slow down, complicate, hesitate.", "src": "Höckert (2020, p.55)"}, {"text": "'Trauma narratives' — how the public is paralysed rather than moved to action. Destruction and despair frameworks undermine people's sense of security and connection. The fairy-tale simple good-evil binary obscures the real complexity of ecological crisis.", "src": "Höckert (2020, pp.57–58)"}, {"text": "Refuse Aristotelian structure: 'beginning–conflict–catharsis'. In ecological crisis there is no clear endpoint. Causal relations are inextricably tangled. Treat narrative as a practice of 'long-term coexistence with problems'. Attention should focus on sustained relations and care.", "src": "Höckert (2020, p.62)"}, {"text": "Melancholy (Glissant/Fanon): starting from the place of pain, transforming historical pain into a productive beginning. Haraway: staying with the trouble. Partial / Plural / Pragmatic / Participatory.", "src": "Glissant; Fanon; Haraway, cited in Höckert (2020, pp.63–65)"}]}, {"id": 16, "author": "Valtchanov, B.L. & Parry, D.C.", "year": "in press", "title": "Feminisms and the sociology of leisure: Advancing a politics of hope, complexity, and radical care.", "themes": ["feminist", "leisure"], "summary": "以Dorothy Smith的社会学男性中心主义批判为起点，系统梳理女性主义视角在休闲社会学中的发展历程（从1960年代的不可见，到补偿性研究，到以女性为中心，到政治希望）。探讨父权制作为系统性分析工具、性别建构（doing gender）、交叉性（intersectionality）对休闲的塑造。提出政治希望（politics of hope）、复杂性（complexity）、激进关怀（radical care）三原则作为未来方向。", "keyArgs": [{"term": "Doing gender（West & Zimmerman）", "exp": "性别是被持续学习/实践/再生产（doing）的过程，不是固定本质。Gender是社会文化建构，通过心理/文化/社会手段实现。使用多元代词不是小题大做，而是迫使社会重新习惯不把性别当成理所当然的二分。"}, {"term": "父权制作为分析工具", "exp": "不是口号，而是对社会结构的描述：男性享有更高的资源获取/话语权/更少的约束。Part of the oxygen of life（Higgins）——难以被直接感知。父权制不等于所有男性都有权力：同性恋男性/贫困男性/被种族化的男性可能享受不到红利。"}, {"term": "Kimmel的反转命题", "exp": "不是差异导致不平等，而是不平等制造了差异（Kimmel, 2006）。父权社会先制造权力不对等，再用男女天生不同来正当化这个不对等。这是一个认识论上的根本反转——结构先于差异，而非差异导致结构。"}, {"term": "交叉性（Crenshaw 1989）", "exp": "压迫是同时发生的、彼此不可分割的整体，不是加法模型。Thornton Dill & Kohlman：压迫如何融合成特定样式出现。白人西方女性主义的批判：忽视殖民历史/土地剥夺/种族政治，原住民女性不一定认同女性主义标签。"}, {"term": "激进关怀（radical care）", "exp": "对研究对象/参与者的关怀，对研究者自己以及彼此的关怀。承认主观性/关系性/情感劳动，不再假装中立。研究是会伤人的（research hurts）——find your village。反对hustle culture和表演性的包容。"}], "questions": ["少数民族女性在景区的表演性微笑和民族服饰，到底是她们的休闲/自我表达，还是被市场和地方政府当作城市游客的观赏资源？她们有没有真正属于自己的闲暇？", "中国996/内卷对男性和女性的影响并不对称——如何在休闲研究框架中纳入这种不对称性？", "Lululemon在中国的文化影响：体型规范化和阶层化的身体政治如何在健身文化中运作？"], "thinkers": ["Smith", "Henderson", "Shaw", "Kimmel", "Crenshaw", "Hochschild", "hooks", "West", "Zimmerman"], "method": "女性主义方法论的五个共同点：研究不是中立的；personal is political；女性生活经验是知识来源；研究关系本身有价值；真理/客观性不是唯一/可能的终点（Thompson, 1992）。", "note": "民族地区的旅游：少数民族女性身体的浪漫化/异域化——是否有人在做关于这些女性的表演性微笑背后的劳动研究？", "related": ["Hesse-Biber 2007", "hooks 1991", "Lopez 2024", "Bailey et al 2023", "Taylor 2017"], "quotes": [{"text": "Gender: learning, practising, reproducing gender — a continuous process, doing gender (West & Zimmerman, 1987; Freysinger et al., 2013). Using multiple pronouns is not making a fuss — it forces society to re-learn not taking gender as a self-evident binary.", "src": "West & Zimmerman (1987); Freysinger et al. (2013); Valtchanov & Parry (in press)"}, {"text": "Patriarchy is a highly effective analytical tool — not a slogan, but a description of social structure. 'Part of the oxygen of life' (Higgins, 2018) — difficult to touch. Patriarchy does not mean power and status for all men.", "src": "Higgins (2018), cited in Valtchanov & Parry (in press)"}, {"text": "Michael Kimmel (2006): not 'difference leads to inequality', but 'inequality produces difference'. Patriarchal society first creates power asymmetry, then uses 'men and women are naturally different' to legitimate that asymmetry.", "src": "Kimmel (2006), cited in Valtchanov & Parry (in press)"}, {"text": "Intersectionality (Crenshaw, 1989): oppression is simultaneously occurring and indivisible as a whole — the additive model. How oppression 'fuses into particular patterns' — challenge. White Western feminism: ignoring colonial history, land dispossession, violence and racial politics.", "src": "Crenshaw (1989); Thornton Dill & Kohlman (2012); cited in Valtchanov & Parry (in press)"}, {"text": "Radical Care: caring for research subjects/participants, for the researcher herself, and for each other. Acknowledging subjectivity, relationality, emotional labour — no longer pretending to be neutral. Research hurts — find your village.", "src": "Valtchanov & Parry (in press)"}]}, {"id": 17, "author": "Hesse-Biber, S.N.", "year": "2007", "title": "Feminist research: Exploring the interconnections of epistemology, methodology, and method. In Handbook of Feminist Research. SAGE.", "themes": ["feminist"], "summary": "通过Harriet Jacobs的奴隶叙事、Virginia Woolf的知识空间批判、de Beauvoir的他者分析、bell hooks的理论实践观，建立女性主义认识论的谱系。系统区分女性主义经验主义、立场认识论（standpoint epistemology）和后现代/后结构主义女性主义的认识论主张与方法论含义。中心论点：女性主义研究不只是把女人塞入样本，而是重写什么叫知识、谁能知道、如何知道。", "keyArgs": [{"term": "立场认识论（standpoint epistemology）", "exp": "Marx的阶级分析延伸：被压迫者对权力结构有更深的洞察，因为必须理解压迫者的系统才能生存。Who can know? / What can be known? 最大贡献：把压迫位置的主体经验定义为知识起点，而非主观抱怨。"}, {"term": "Situated knowledges（Haraway）", "exp": "主流科学的上帝把戏（the god trick）：假装从无处看一切（view from nowhere），其实是特权位置的隐形。真正诚实的客观性不是假装无立场，而是公开承认位置。Partial/situated/power-imbued/relational的知识才能强迫研究者承担责任。"}, {"term": "Strong objectivity（Harding）", "exp": "要求研究者进行强烈的自我反思，包括研究议题从哪里来、谁受益、谁被排除。Context of discovery（发现语境）同样需要批判性审查，不只是justification（辩护语境）。"}, {"term": "沙洲（sandbar）隐喻", "exp": "研究者的位置是流动的、非常脆弱的：任何选择都有风险。持续地连接、断开、再连接。差异不是要消灭的，而是需要在其中生存/谈判/结盟/行动的条件本身。边缘是抵抗与创造的空间。"}, {"term": "女性主义访谈法的特殊性", "exp": "倾听沉默：倾听未说出口的内容（subjugated knowledge）。访谈应具有reciprocity：知识生产的合作者，而非单向提取。升格个人经验为研究对象；praxis必须从研究一开始贯穿而非事后加入。"}], "questions": ["当西方女性主义者代表第三世界女性发言时，代表行为本身是否再次让对方失语？如何区分团结（solidarity）和代言（speaking for）？", "交叉性的全球化应用：如何在不挪用的前提下，建立跨地区的认识论对话而不建立在抹杀差异上？", "后结构主义批评者（Butler）说：如果你坚持女性是什么，你还是在本质化——女性主义如何在解构本质的同时保持政治锋利度？"], "thinkers": ["Jacobs", "Woolf", "de Beauvoir", "Friedan", "Smith", "Anzaldua", "hooks", "Lorde", "Harding", "Haraway", "Spivak", "Butler"], "method": "女性主义研究praxis：把女性主义视角直接放进研究过程本身，而非作为事后的伦理审查。包括：reflexivity；reciprocal访谈；倾听沉默；升格个人经验为研究对象。", "note": "谁被听见？谁被压下？如何把被压抑的经验带回知识中心？如何用这些经验改变整个社会结构？", "related": ["Valtchanov & Parry", "hooks 1991", "Taylor 2017", "Berbary 2017"], "quotes": [{"text": "Harriet Jacobs (1861/1987): 'pit of abominations' — only those who have lived through it know slavery. Personal experience is testimony; testimony is a political instrument. The epistemological foundation: the experiences of the oppressed are not 'subjective noise' but a source of knowledge.", "src": "Jacobs (1861/1987), cited in Hesse-Biber (2007, p.3)"}, {"text": "Dorothy Smith (1978): the systematic exclusion of women from knowledge production. The 'circle' of knowledge is written by men for men. Standpoint epistemology.", "src": "Smith (1978), cited in Hesse-Biber (2007, p.7)"}, {"text": "Haraway — the god trick: mainstream science pretends to view everything from nowhere (view from nowhere), actually the invisibility of a privileged position. True honest 'objectivity' is not pretending you have no position, but openly acknowledging it. Partial, situated, power-imbued, relational.", "src": "Haraway (1988), cited in Hesse-Biber (2007, pp.12–13)"}, {"text": "Strong objectivity (Harding, 1993): requiring strong self-reflexivity from researchers — the context of discovery is also subject to critical examination, not only the context of justification.", "src": "Harding (1993), cited in Hesse-Biber (2007, p.14)"}, {"text": "Sandbar metaphor: this position is fluid, very fragile, because any choice has risks. Continuously connecting, disconnecting, reconnecting. Difference is not to be eliminated, but the very condition in which one must learn to survive, negotiate, ally, and act.", "src": "Hesse-Biber (2007, pp.18–19)"}, {"text": "Feminist interviewing: listening to silence — listening to what is not said. 'You know' — subjugated knowledge. Interviews should have reciprocity. 'Upgrade the personal as an object of study'. Praxis from the beginning, not as an afterthought.", "src": "Hesse-Biber (2007, p.22)"}]}, {"id": 18, "author": "hooks, b.", "year": "1991", "title": "Theory as liberatory practice. Yale Journal of Law and Feminism, 4(1).", "themes": ["feminist", "critical"], "summary": "个人陈述：因为受伤才走向理论——不是冷冰冰的抽象，而是因为痛苦太强烈、活不下去，迫切需要理解发生了什么，让痛消失。理论是疗愈（healing）、恢复（recovery）、解放（liberation）的生存实践。批判女性主义内部的智识阶级层级：这是统治政治（politics of domination）在女性主义内部的再现。解放性理论的标准：必须大众可参与、口头可流通、能推动变革——在监狱、黑人餐馆、社区里流通。", "keyArgs": [{"term": "理论作为生存实践", "exp": "不是因为学术训练而走向理论，而是因为痛苦迫切需要理解。理论是疗愈的地点（site of healing）。这将理论的起点从特权的认识论游戏转向生存的迫切需要——谁需要理论？那些受伤的人。"}, {"term": "知识的集体源头", "exp": "女性主义理论不是单个明星学者的个人天才，而是经常从集体资源（collective sources）里生长出来。女性主义要有扩张式视野，挑战女人=白人中产异性恋女人的假设。"}, {"term": "沉默即共谋（complicity）", "exp": "拒绝理论只是让父权/种族主义/资本主义的理论占领头脑，不受挑战。理论永远在起作用，无论我们承认与否。沉默不是中立，而是一种共谋。"}, {"term": "解放性理论的流通条件", "exp": "必须在口头可流通：在社区、监狱、黑人餐馆里流通；必须能让人启动改变。抽象理论如果不能转化为日常实践，就失去了解放性。"}, {"term": "智识阶级层级批判", "exp": "女性主义内部的行动>理论二元对立：贬低理论工作，认为只有行动才是真正的女性主义。这是统治政治在内部的再现，攻击了挣扎中的女性脆弱心理，加剧而非消除了不平等。"}], "questions": ["如何在精英学术与大众可参与之间架桥，而不降低理论的复杂性？", "沉默本身在哪些情况下是正当的，哪些情况下是共谋？这条线在哪里？", "lifestyle-based feminism（仅停留在个人生活选择层面）与politicized revolutionary feminist movement的区别是什么？什么让后者更有力量？"], "thinkers": ["hooks", "Freire", "Audre Lorde", "de Beauvoir", "Combahee River Collective"], "method": "在研究写作中，问自己：这个理论在谁那里流通？谁能读懂/使用它？理论的可及性本身是一个政治问题，不只是表达风格问题。", "note": "因为受伤才走向理论——这个起点让理论不只是认识论工具，而是生命实践。这改变了我对理论工作意义的理解。", "related": ["Taylor 2017", "Hesse-Biber 2007", "Crotty critical 1998", "Berbary forthcoming"], "quotes": [{"text": "It was 'because of hurting' that she turned to theory — not cold abstraction, but because the pain was too intense, she 'urgently' needed to understand what had happened. She says she 'saw a site of healing in theory'. Theory is for healing, recovery, liberation.", "src": "hooks (1991, p.1)"}, {"text": "Feminist theory is not the personal genius of individual star scholars, but frequently grows from 'collective sources'. Feminism needs an 'expansive perspective' — challenging the assumption that 'woman = white, middle-class, heterosexual woman'.", "src": "hooks (1991, pp.3–4)"}, {"text": "Silence is complicity. Refusing to 'acknowledge' theory simply lets patriarchy/racism/capitalism's theory occupy our minds, unchallenged. Theory is always at work, whether we acknowledge it or not.", "src": "hooks (1991, p.7)"}, {"text": "Intellectual class hierarchy is the reproduction of 'politics of domination' within feminism itself — the binary action>theory assaults the fragile psyches of women struggling to throw off patriarchy, aggravating rather than eliminating inequality.", "src": "hooks (1991, pp.8–9)"}, {"text": "Liberatory theory: it must circulate orally — in communities, prisons, Black restaurants; it must enable people to initiate change, including enabling imprisoned Black men to begin reflecting on and deconstructing their patriarchally-shaped gender views.", "src": "hooks (1991, pp.10–11)"}]}, {"id": 19, "author": "Lopez, S.", "year": "2024", "title": "[Feminist/critical race intersectional analysis].", "themes": ["feminist", "crt"], "summary": "交叉性女性主义与批判种族理论的整合分析框架。探讨种族、性别、阶级、性取向等多重压迫轴线在特定社会语境中的交织运作，以及这种交织如何具体地塑造边缘化群体（特别是有色人种女性）的休闲/旅游/日常生活经验。批判单一轴线分析的局限，强调多重身份的具体生活经验作为理论和实践的出发点。关键洞见：处于多重压迫交汇点的经验提供了独特的认识论视角，能够揭示主流分析所看不见的结构。", "keyArgs": [{"term": "多重轴线交织分析", "exp": "种族+性别+阶级+性取向等压迫轴线在具体生活中是同时运作的整体，而非可分别分析的独立变量。交叉性不是加法（不是1+1+1=3），而是各轴线相互构成的整体结构。"}, {"term": "有色人种女性的认识论特权", "exp": "处于多重压迫交汇点的经验提供了独特的认识论视角，能够揭示主流分析所看不见的结构。这不是情感化的个人经历，而是系统性的认识论资源。"}, {"term": "理论与实践的循环", "exp": "理论必须从实际生活经验出发；实践必须由理论指导；两者在具体斗争中不断循环生产新知识。这与Berbary的theorypractice和hooks的理论作为生存实践相互呼应。"}, {"term": "解放实践的双重要求", "exp": "既需要批判分析（揭示多重压迫的运作机制），也需要具体的集体行动和制度变革。分析不够，还需要组织、动员、结盟。"}], "questions": ["在不同文化语境（如中国、东南亚）中，交叉性框架如何被调适和应用？哪些轴线需要被调整？", "有色人种女性在旅游/休闲研究中的具体经验：她们的声音如何被系统性地排斥在主流研究议程之外？", "如何在研究设计中真正实现有色人种女性的认识论主体性，而不只是把她们作为研究对象？"], "thinkers": ["Crenshaw", "Collins", "Anzaldua", "Lorde", "hooks", "Davis"], "method": "在研究中，识别并明确说明多重压迫轴线如何同时运作于研究场域。避免单一轴线分析——不只看种族，也不只看性别，而是追踪它们的交织。", "note": "", "related": ["Valtchanov & Parry", "hooks 1991", "Crenshaw et al 1995", "Hesse-Biber 2007"], "quotes": [{"text": "The 'dirtiest, hardest work' — women of colour, intensified by industrialisation. 'Labouring bodies' — people become tools (Bhattacharya, 2017). The gender–labour adhesion: women become the 'default providers of care' (Tronto, 2013).", "src": "Glenn (1985); Bhattacharya (2017); Tronto (2013), cited in Lopez (2024)"}, {"text": "Not all bodies deserve to be seen by society (Mooers, 2003). Care confuses the boundaries between labour, leisure, and repair — no boundary. Genderacialisation. Invisible/Hypervisible double situation.", "src": "Mooers (2003); Lopez (2018; 2021), cited in Lopez (2024)"}, {"text": "Feminist and Critical Race Theory (CRT) + critical narrative inquiry + antenarratology. The body stores memory and emotion; many experiences cannot necessarily be expressed 'in words' (Young, 1997; Van der Kolk, 2015). Ante-narrative: attention to 'pre-narrative/unfinished story fragments' (Boje).", "src": "Young (1997); Van der Kolk (2015); Boje (2006), cited in Lopez (2024)"}]}, {"id": 20, "author": "Ladson-Billings, G.", "year": "1998", "title": "Just what is critical race theory and what's it doing in a nice field like education? IJQSE, 11(1).", "themes": ["crt"], "summary": "将CRT从法学界引入教育研究：聚焦课堂叙事、反律法主义（counter-legal）、counter-stories的力量。核心分析工具：Whiteness as Property（Harris：白性作为可排他/可享用/具地位声望的财产）；Interest-Convergence（Bell：政策转向往往出自利益汇合而非价值觉醒）；Curriculum master scripting（官方课程维护白人至上主剧本）。批判色盲与竞赛中立的教育话语，强调命名现实（naming one's reality）的力量。", "keyArgs": [{"term": "Whiteness as Property（Harris 1993）", "exp": "白性被建构为一种财产：可排他（exclusionary）、可享用（possessive）、具有地位声望。经济性：白人身份有可量化的物质和社会价值。在教育中体现为：谁的知识被视为正当知识，谁的经历被视为普遍经验。"}, {"term": "Interest-Convergence（Bell 1980）", "exp": "有色人种的政策获益往往出自白人利益与有色人种利益的汇合，而非出于对平等的价值承诺。例：Brown v. Board of Education被解读为当时符合美国在冷战中的国际形象利益。政策倡导需要识别这种利益结构。"}, {"term": "课程主剧本（master scripting）", "exp": "官方课程是维护白人至上主剧本的文化产物：只正当化白人/上层/男性话语，压制并扭曲其他群体的故事。结果：上升失败的罪咎被归于个人，而非结构性内容扭曲/机会差异。"}, {"term": "命名现实（naming one's reality）", "exp": "边缘群体的心理自保工具：能够识别并命名自己所经历的不公正，是克服dysconscious racism的第一步。Counter-stories不只是个人叙事，而是对抗主剧本的认识论实践。"}, {"term": "评估批判", "exp": "会不会做题不等于会不会生活。智力测评的历史：被用来正当化种族/阶级/性别的等级叙事。陈旧刻板印象通过评估体系被持续再生产——这是系统性种族主义的制度形态。"}], "questions": ["多元文化主义如何成为结构压迫去历史化/道德化的工具，反而维护了主剧本？", "CRT强调种族意识（race consciousness）——这与色盲（color-blind）的区别是什么？在实践中如何操作？", "学校去隔离（desegregation）常以对白人有利的方式推进——Bell的被牺牲的黑人儿童寓言在当代有何现实意义？"], "thinkers": ["Ladson-Billings", "Bell", "Harris", "Delgado", "Crenshaw", "Swartz", "Marable", "Williams"], "method": "CRT在教育研究中的应用：使用counter-stories作为数据；分析课程内容中的master scripting；检验Interest-Convergence逻辑在政策改革中的运作。", "note": "CRT在中国教育语境中是否有对话可能？差异性/去历史化的话语如何在中国教育政策中运作？", "related": ["Crenshaw et al 1995", "Melamed 2015", "Bailey et al 2023", "Berbary forthcoming", "Taylor 2017"], "quotes": [{"text": "Whiteness as Property (Harris, 1993): whiteness is constructed as a form of property — exclusionary, possessive, with status and prestige. The economic dimension: white identity has a quantifiable material and social value.", "src": "Harris (1993), cited in Ladson-Billings (1998, p.9)"}, {"text": "Interest-Convergence (Bell, 1980): the policy gains of people of colour often emerge from a convergence of white interests and the interests of people of colour, not from a commitment to the value of equality. E.g., Brown v. Board of Education.", "src": "Bell (1980), cited in Ladson-Billings (1998, p.10)"}, {"text": "Master scripting (Swartz, 1992): the official curriculum is a cultural product that maintains the white supremacist master script — only legitimating white/elite/male discourse, suppressing and distorting other groups' stories.", "src": "Swartz (1992), cited in Ladson-Billings (1998, p.13)"}, {"text": "Naming one's reality: the psychological self-protection tool of marginalised groups — being able to identify and name the injustice they experience is the first step in overcoming dysconscious racism (King, 1992). Counter-stories are not just personal narratives but an epistemological practice against the master script.", "src": "King (1992); Ladson-Billings (1998, p.15)"}]}, {"id": 21, "author": "Crenshaw, K., et al.", "year": "1995", "title": "Critical Race Theory: The Key Writings [Introduction]. The New Press.", "themes": ["crt"], "summary": "CRT的制度-政治发生背景：以法学院为基地，有色人种学者为主体的左翼学术运动。明确拒斥中立/客观的学术神话，强调学术必然是政治的。批判民权话语的加害者视角（perpetrator perspective）：把种族主义定义为有意识的个体偏见/差别对待，从而系统性地否认其结构性。色盲（color-blindness）意识形态：服务于机会平等/精英统治神话，回避对财富/教育/权力分布根本原因的追问。", "keyArgs": [{"term": "加害者视角（perpetrator perspective）批判", "exp": "Freeman：主流民权话语把种族主义定义为有意识的个体偏见或差别对待，这系统性地否认种族主义的结构性和制度性维度。结果：受害者被要求证明加害者的意图，而非证明系统性的不平等后果。"}, {"term": "色盲（color-blindness）意识形态批判", "exp": "声称不看种族/肤色以实现平等——但这服务于机会平等/精英统治神话，回避了财富/教育/权力为何如此分配的根本追问。被迫把平权行动辩护为例外/临时补救，而非正面承认种族类别的历史-结构现实。"}, {"term": "Antithetical knowledge（Said）", "exp": "CRT写作是介入式/对抗式写作，直接对抗建制知识。明确拒斥中立/客观的学术神话，知识生产即政治实践，没有中立的位置。"}, {"term": "自由派与保守派的共享框架", "exp": "两者都把种族主义理解为色盲的反面（即：种族意识=种族主义）。这一共享框架使得真正的结构性分析在主流政治话语中找不到位置——左和右在这个问题上共享了错误的前提。"}, {"term": "种族意识传统的复兴", "exp": "对20世纪六七十年代形成的主流民权话语的深刻不满：种族主义被视为偶发的/个体的/加害者导向的。CRT要复兴种族意识传统，对抗色盲成为开明常识后的去政治化，捍卫群体自决的激进视角。"}], "questions": ["CRT强调学术必然是政治的——这是否取消了学术严谨性的空间？政治性与严谨性如何共存？", "权利话语（rights discourse）的两面性：可能被工具化/去政治化，但也有赋权/再想象公民身份的历史-变革价值。CRT如何处理这个张力？", "CRT在美国法学-教育语境中发展出来，如何评估其在非美语境（如中国、全球南方）中的适用性与局限性？"], "thinkers": ["Bell", "Freeman", "Delgado", "Matsuda", "Williams", "Lawrence", "Harris", "Said", "Crenshaw"], "method": "CRT的方法论工具：counter-stories；种族意识分析；揭示Interest-Convergence；追踪白性作为财产的运作。在研究写作中，需要清楚说明自己的政治立场，而非假装中立。", "note": "自由派和保守派共享色盲框架这一发现，在阅读时产生了一种豁然开朗的感觉——这解释了为什么很多看似进步的政策实际上无法触及结构性种族主义。", "related": ["Ladson-Billings 1998", "Melamed 2015", "Taylor 2017", "Bailey et al 2023", "Todd 2016"], "quotes": [{"text": "The perpetrator perspective (Freeman): mainstream civil rights discourse defines racism as conscious individual bias or differential treatment — this systematically denies the structural and institutional dimensions of racism. Result: victims are required to prove the perpetrator's intent, not systemic unequal consequences.", "src": "Freeman, cited in Crenshaw et al. (1995, p.xiv)"}, {"text": "Color-blindness ideology: claiming not to see race/skin colour to achieve equality — but this serves the myth of equal opportunity/meritocracy, avoiding the fundamental question of why wealth/education/power are distributed as they are.", "src": "Crenshaw et al. (1995, pp.xv–xvi)"}, {"text": "CRT writing is antithetical knowledge (Said): intervening/oppositional writing directly confronting institutional knowledge. Explicitly rejecting the myth of neutral/objective scholarship — knowledge production is political practice — No Exit.", "src": "Said; cited in Crenshaw et al. (1995, p.xxi)"}, {"text": "Both liberals and conservatives understand racism as the opposite of colour-blindness (i.e., race-consciousness = racism). This shared framework means genuinely structural analysis cannot find space in mainstream political discourse — left and right share a wrong premise.", "src": "Crenshaw et al. (1995, pp.xix–xx)"}]}, {"id": 22, "author": "Melamed, J.", "year": "2015", "title": "Racial capitalism. Critical Ethnic Studies, 1(1).", "themes": ["crt", "critical"], "summary": "提出核心命题：现代资本主义=种族资本主义（racial capitalism）。资本积累通过种族化技术制造被抛弃和贬值的人群（abandoned and devalued populations）。批判反种族主义的自由主义话语与治理术：表面的代表性与包容叙事掩盖了再分配与去殖民承诺的缺失，道德语言覆盖结构问题，不平等被个体化。", "keyArgs": [{"term": "种族化即生产关系技术", "exp": "种族不是资本主义的副产品或外套，而是其内在的生产技术：可移动的、可编程的（programmable）统治技术。人的分类/计量/阀值——谁被视为可剥削的劳动力，谁被视为可抛弃的人口，这是种族化生产关系的核心机制。"}, {"term": "差等化的生命估值", "exp": "资本主义通过差等化的生命估值来组织再生产：某些生命被视为可牺牲的（expendable）、可抛弃的（abandoned）。Organized abandonment（有组织的遗弃）与Organized violence（有组织的暴力）共同构成种族资本主义的运作机制。"}, {"term": "金融化与种族化的交织", "exp": "Risk shift：金融风险被转移到个人（尤其是有色人种）身上，同时系统性收益流向白人/机构。这不是市场中性的结果，而是种族化的再分配机制。"}, {"term": "包容叙事的局限", "exp": "可见度（visibility）与包容（inclusion）叙事替代了对再分配与去殖民的实质承诺。道德语言（diversity/equity/inclusion）覆盖结构问题，不平等被个体化。大学与知识体制的囚笼：知识生产也是种族资本主义的组成部分。"}, {"term": "有效的反种族主义路径", "exp": "必须走向abolitionist（废除主义）与去殖民的政治，而非只是多元文化主义改良。知识-政治-组织三联动：批判研究必须与政治组织能力建设相连，否则只是学术内部的符号游戏。"}], "questions": ["如何在具体的休闲研究中分析种族化的可编制性？哪些休闲实践/政策体现了种族资本主义的逻辑？", "组织能力建设如何成为批判研究的具体落点？研究者如何在学术和组织实践之间找到连接？", "种族资本主义分析框架在全球南方/非西方语境中的适用性：中国的阶级-民族-地区差异是否构成一种不同形态的差等化生命估值？"], "thinkers": ["Melamed", "Robinson", "Coulthard", "Foucault", "Gilmore", "Davis"], "method": "分析休闲政策/项目时，追问：谁的生命被这个项目视为值得投资的？谁被有组织地遗弃/排除？这些差异是否沿着种族/民族/阶级的线条分布？", "note": "", "related": ["Ladson-Billings 1998", "Crenshaw et al 1995", "Bailey et al 2023", "Berbary forthcoming", "Tuck & Yang 2012"], "quotes": [{"text": "Modern capitalism = racial capitalism. Capital accumulation: racial technologies, manufacturing 'abandoned and devalued' populations. The origins lie in racialised difference (labour, land, life). Racialisation is a technology of production relations — mobile, programmable domination technology.", "src": "Melamed (2015, pp.77–78)"}, {"text": "Capitalism organises reproduction through differential valuation of life — some things are seen as expendable, disposable. Organised abandonment and organised violence jointly constitute the operating mechanisms of racial capitalism.", "src": "Melamed (2015, p.79)"}, {"text": "Visibility and inclusion narratives replace the substantive commitment to redistribution and decolonisation. Moral language (diversity/equity/inclusion) covers structural problems, inequality is individualised. The cage of universities and knowledge institutions: knowledge production is also part of racial capitalism.", "src": "Melamed (2015, pp.80–81)"}, {"text": "Knowledge–politics–organisation trinity: critical research must be connected to building political organisational capacity; otherwise it is only symbolic play within academia. Effective anti-racism must move toward abolitionist and decolonising politics.", "src": "Melamed (2015, pp.83–84)"}]}, {"id": 23, "author": "Bailey, K. A., et al.", "year": "2023", "title": "In the wake of Canada's violent eugenic legacies: An urgency to ReVision Fitness. Leisure/Loisir.", "themes": ["leisure", "crt"], "summary": "批判健身领域中持续运作的白人身体至上主义（white corporeal supremacy）：即使在进步的行动主义话语中，优生学遗产、能力主义和包容主义（Inclusionism）的局限仍然可见。Non-performativity（Ahmed）：政策宣示的存在恰恰掩盖了实质性不平等的持续。提出休息的政治（politics of rest）：休息同样被种族化/能力化/体型化，谁被允许休息、谁被贴懒标签，是种族-能力-阶级权力的体现。", "keyArgs": [{"term": "白人身体至上（white corporeal supremacy）", "exp": "在健身/休闲空间中持续运作的种族-能力-体型等级秩序，即便在进步话语（包容/多元）的表面下仍然有效。优生学遗产的制度化：通过能力主义（ableism）和体型歧视，继续差等化身体价值。"}, {"term": "Inclusionism批判", "exp": "表面欢迎差异，但差异者必须以符合规范（compliance）为前提才能进场。把包容（inclusion）的责任转嫁给被排斥者（被要求先符合标准）。强调改造个体而非改变体制；资源重新流向本来就能的身体。"}, {"term": "Non-performativity（Ahmed, 2006）", "exp": "政策之所以有效，恰恰因为它不产生其名义上的改变；它把行动的幻觉当作行动本身。宣示的存在掩盖了不平等——机构以承认问题当作已改问题。差异者的劳动被转为空转。"}, {"term": "休息的政治（politics of rest）", "exp": "休息同样被种族化/能力化/体型化：谁被允许休息，谁被贴懒标签。西方瑜伽的殖民化；静止/冥想被商品化为提升产能的快修——这本身就是能力主义-资本主义逻辑的体现。休息能否成为对生产力逻辑的抵抗？"}, {"term": "ReVision健身的定义", "exp": "把任何能带来喜悦的休闲活动都视为健身，而非以身体标准化/规范化为核心。从自我到制度：拆解能力主义-种族制度需要长期的个人与集体努力，而非单纯的包容修辞。"}], "questions": ["只有当我承认差异才能被公平对待，但当我承认差异时又被排除——公平对待的真正前提是什么？承认差异与消除歧视之间的悖论如何解决？", "当机构以承认问题当作已改问题时，差异者的劳动如何避免空转？有哪些具体的制度设计可以防止Non-performativity？", "休息作为对能力主义-资本主义生产冲动的抵抗：这在实践中意味着什么？如何在不浪漫化休息的同时坚持其政治意义？"], "thinkers": ["Ahmed", "Bailey", "Mobley", "Kafer", "Rice", "Mitchell", "Snyder"], "method": "在休闲研究中，分析哪些身体被默认为健身的标准身体；谁的存在使这些标准不言自明；包容叙事如何在实践中产生Non-performativity效果。", "note": "想起东南亚跨性别研究的问题：泰国跨性别者的结构性处境——法律层面的性别标记歧视、性旅游的经济压力、媒体对跨性别身体的消费化。", "related": ["Valtchanov & Parry", "Crenshaw et al 1995", "Ladson-Billings 1998", "Hamrie & Fritsch 2019", "Changfoot et al 2022"], "quotes": [{"text": "White corporeal supremacy: the racial–ability–body-size hierarchical order operating in fitness/leisure spaces, even effective under the surface of progressive discourse (inclusion/diversity). The institutionalisation of eugenic heritage through ableism and body discrimination.", "src": "Bailey et al. (2023, pp.3–4)"}, {"text": "Inclusionism: apparently welcoming difference, but those who are different must comply with norms as a precondition for entry. Transfers the responsibility of inclusion to the excluded (required to first meet standards). Emphasises reforming the individual rather than changing the institution.", "src": "Bailey et al. (20
