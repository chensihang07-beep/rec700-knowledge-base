<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REC 700 · 个人知识体系库</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --bg2: #181714;
    --bg3: #201e1a;
    --border: #2e2b26;
    --amber: #c8953a;
    --amber-light: #e8b86d;
    --amber-dim: #7a5820;
    --cream: #e8e0d0;
    --cream-dim: #9a9080;
    --red: #b85042;
    --teal: #3a7a72;
    --violet: #6b5a8c;
    --sage: #4a6b4a;
    --rose: #8c4a5a;
    --steel: #3a5870;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
    opacity: 0.4;
  }

  /* Header */
  header {
    position: relative;
    padding: 56px 48px 40px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(200,149,58,0.06) 0%, transparent 100%);
  }

  .header-eyebrow {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 12px;
  }

  .header-title {
    font-family: 'IM Fell English', serif;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 400;
    color: var(--cream);
    line-height: 1.1;
    letter-spacing: -0.5px;
  }

  .header-title span {
    color: var(--amber);
  }

  .header-subtitle {
    margin-top: 12px;
    font-size: 13px;
    color: var(--cream-dim);
    letter-spacing: 0.5px;
    line-height: 1.8;
  }

  .header-meta {
    display: flex;
    gap: 32px;
    margin-top: 28px;
  }

  .meta-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .meta-num {
    font-family: 'IM Fell English', serif;
    font-size: 28px;
    color: var(--amber);
    line-height: 1;
  }

  .meta-label {
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--cream-dim);
    text-transform: uppercase;
  }

  /* Controls */
  .controls {
    padding: 28px 48px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15,14,12,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .search-wrap {
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 16px; top: 50%;
    transform: translateY(-50%);
    color: var(--amber-dim);
    font-size: 14px;
  }

  #search {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px 12px 44px;
    color: var(--cream);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px;
    font-weight: 300;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 0.3px;
  }

  #search::placeholder { color: var(--cream-dim); opacity: 0.5; }
  #search:focus { border-color: var(--amber-dim); box-shadow: 0 0 0 3px rgba(200,149,58,0.08); }

  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }

  .filter-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--amber-dim);
    margin-right: 4px;
  }

  .pill {
    padding: 5px 14px;
    border-radius: 100px;
    border: 1px solid var(--border);
    font-size: 12px;
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 300;
    cursor: pointer;
    transition: all 0.18s;
    background: transparent;
    color: var(--cream-dim);
    letter-spacing: 0.3px;
    user-select: none;
  }

  .pill:hover { border-color: var(--amber-dim); color: var(--amber-light); }

  .pill.active {
    background: var(--amber);
    border-color: var(--amber);
    color: var(--bg);
    font-weight: 500;
  }

  /* Results bar */
  .results-bar {
    padding: 16px 48px 0;
    font-size: 12px;
    color: var(--cream-dim);
    letter-spacing: 0.5px;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
    padding: 20px 48px 64px;
  }

  /* Card */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    animation: fadeUp 0.4s ease both;
    display: flex;
    flex-direction: column;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    border-color: var(--amber-dim);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-accent {
    height: 3px;
    flex-shrink: 0;
  }

  .card-body {
    padding: 20px 22px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card-header {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .card-author {
    font-family: 'IM Fell English', serif;
    font-size: 16px;
    color: var(--cream);
    line-height: 1.3;
  }

  .card-year {
    font-size: 11px;
    color: var(--amber);
    letter-spacing: 1px;
  }

  .card-title {
    font-size: 12px;
    color: var(--cream-dim);
    line-height: 1.5;
    font-style: italic;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .tag {
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 10px;
    letter-spacing: 0.5px;
    font-weight: 500;
    text-transform: uppercase;
  }

  .card-summary {
    font-size: 12.5px;
    line-height: 1.8;
    color: var(--cream-dim);
  }

  /* Expanded content */
  .card-detail {
    display: none;
    padding: 0 22px 20px;
    flex-direction: column;
    gap: 16px;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card.open .card-detail { display: flex; }

  .detail-divider {
    height: 1px;
    background: var(--border);
  }

  .detail-section-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--amber-dim);
    margin-bottom: 6px;
  }

  .concept-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .concept-list li {
    font-size: 12px;
    line-height: 1.6;
    color: var(--cream-dim);
    padding-left: 14px;
    position: relative;
  }

  .concept-list li::before {
    content: '◆';
    position: absolute;
    left: 0;
    font-size: 7px;
    color: var(--amber-dim);
    top: 5px;
  }

  .concept-list li strong {
    color: var(--cream);
    font-weight: 500;
  }

  .question-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .question-list li {
    font-size: 12px;
    line-height: 1.7;
    color: var(--cream-dim);
    padding: 8px 12px;
    background: rgba(200,149,58,0.04);
    border-left: 2px solid var(--amber-dim);
    border-radius: 0 4px 4px 0;
  }

  .personal-note {
    font-size: 12px;
    line-height: 1.7;
    color: #7a8a6a;
    padding: 10px 14px;
    background: rgba(74,107,74,0.1);
    border-left: 2px solid #4a6b4a;
    border-radius: 0 4px 4px 0;
    font-style: italic;
  }

  .card-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    color: var(--amber-dim);
    font-size: 11px;
    letter-spacing: 1px;
    gap: 6px;
    border-top: 1px solid var(--border);
    transition: color 0.2s, background 0.2s;
  }

  .card:hover .card-toggle { color: var(--amber); }
  .card.open .card-toggle { color: var(--amber); background: rgba(200,149,58,0.04); }

  .toggle-arrow {
    display: inline-block;
    transition: transform 0.25s;
    font-size: 9px;
  }

  .card.open .toggle-arrow { transform: rotate(180deg); }

  /* Theme colors */
  .theme-method { background: linear-gradient(90deg, #3a5870, #2a4055); }
  .theme-indigenous { background: linear-gradient(90deg, #4a6b4a, #324832); }
  .theme-crt { background: linear-gradient(90deg, #8c4a5a, #5a2a38); }
  .theme-feminist { background: linear-gradient(90deg, #6b5a8c, #3d2e5a); }
  .theme-positivism { background: linear-gradient(90deg, #7a5820, #4a3210); }
  .theme-phenomenology { background: linear-gradient(90deg, #3a7a72, #1e3d3a); }
  .theme-constructionism { background: linear-gradient(90deg, #5a6a7a, #2e3840); }
  .theme-queer { background: linear-gradient(90deg, #7a3a5a, #4a1e38); }
  .theme-critical { background: linear-gradient(90deg, #b85042, #6a2018); }
  .theme-materialism { background: linear-gradient(90deg, #4a5a3a, #2a3220); }
  .theme-poststructural { background: linear-gradient(90deg, #5a4a7a, #2a1e42); }
  .theme-tourism { background: linear-gradient(90deg, #3a6a6a, #1e3838); }
  .theme-leisure { background: linear-gradient(90deg, #6a5a3a, #3a2e1a); }
  .theme-neuro { background: linear-gradient(90deg, #4a7a5a, #2a4232); }

  .tag-method { background: rgba(58,88,112,0.3); color: #7ab8e8; border: 1px solid rgba(58,88,112,0.5); }
  .tag-indigenous { background: rgba(74,107,74,0.3); color: #8acf8a; border: 1px solid rgba(74,107,74,0.5); }
  .tag-crt { background: rgba(140,74,90,0.3); color: #e89aa8; border: 1px solid rgba(140,74,90,0.5); }
  .tag-feminist { background: rgba(107,90,140,0.3); color: #c8a8e8; border: 1px solid rgba(107,90,140,0.5); }
  .tag-positivism { background: rgba(122,88,32,0.3); color: #e8b86a; border: 1px solid rgba(122,88,32,0.5); }
  .tag-phenomenology { background: rgba(58,122,114,0.3); color: #7ad8d0; border: 1px solid rgba(58,122,114,0.5); }
  .tag-constructionism { background: rgba(90,106,122,0.3); color: #aabbc8; border: 1px solid rgba(90,106,122,0.5); }
  .tag-queer { background: rgba(122,58,90,0.3); color: #e89ac8; border: 1px solid rgba(122,58,90,0.5); }
  .tag-critical { background: rgba(184,80,66,0.3); color: #e89080; border: 1px solid rgba(184,80,66,0.5); }
  .tag-materialism { background: rgba(74,90,58,0.3); color: #a8c87a; border: 1px solid rgba(74,90,58,0.5); }
  .tag-poststructural { background: rgba(90,74,122,0.3); color: #b89ae8; border: 1px solid rgba(90,74,122,0.5); }
  .tag-tourism { background: rgba(58,106,106,0.3); color: #7ac8c8; border: 1px solid rgba(58,106,106,0.5); }
  .tag-leisure { background: rgba(106,90,58,0.3); color: #d8b87a; border: 1px solid rgba(106,90,58,0.5); }
  .tag-neuro { background: rgba(74,122,90,0.3); color: #8ad8a8; border: 1px solid rgba(74,122,90,0.5); }

  /* Empty state */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 0;
    color: var(--cream-dim);
  }

  .empty-state-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--amber-dim); }

  @media (max-width: 700px) {
    header, .controls, .results-bar, .grid { padding-left: 20px; padding-right: 20px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-eyebrow">个人知识体系库 · 2024</div>
  <h1 class="header-title">REC 700<br><span>研究范式 · 批判理论</span></h1>
  <p class="header-subtitle">哲学社会研究基础 · 认识论与方法论 · 原住民/女性主义/批判视角</p>
  <div class="header-meta">
    <div class="meta-item">
      <span class="meta-num" id="total-count">28</span>
      <span class="meta-label">篇阅读</span>
    </div>
    <div class="meta-item">
      <span class="meta-num">14</span>
      <span class="meta-label">核心主题</span>
    </div>
    <div class="meta-item">
      <span class="meta-num">∞</span>
      <span class="meta-label">批判性问题</span>
    </div>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search-input" placeholder="搜索作者、概念、关键词…" autocomplete="off">
  </div>
  <div class="filter-row">
    <span class="filter-label">主题</span>
    <button class="pill active" data-theme="all">全部</button>
    <button class="pill" data-theme="method">方法论框架</button>
    <button class="pill" data-theme="indigenous">原住民方法论</button>
    <button class="pill" data-theme="positivism">实证主义</button>
    <button class="pill" data-theme="phenomenology">现象学</button>
    <button class="pill" data-theme="constructionism">社会建构主义</button>
    <button class="pill" data-theme="critical">批判理论</button>
    <button class="pill" data-theme="feminist">女性主义</button>
    <button class="pill" data-theme="crt">批判种族理论</button>
    <button class="pill" data-theme="queer">酷儿理论</button>
    <button class="pill" data-theme="poststructural">后结构主义</button>
    <button class="pill" data-theme="materialism">新唯物主义</button>
    <button class="pill" data-theme="tourism">旅游/去殖民</button>
    <button class="pill" data-theme="leisure">休闲研究</button>
  </div>
</div>

<div class="results-bar"><span id="results-text"></span></div>

<div class="grid" id="grid"></div>

<script>
const readings = [
  {
    author: "Crotty, M.",
    year: "1998",
    title: "Introduction: The research process [Ch. 1]",
    themes: ["method"],
    summary: "厘清方法论迷宫：方法→方法论→理论视角→认识论的四层层级关系，提出这是层级而非平行关系。以定性/定量分别对应建构主义→符号互动论→民族志→参与式观察和客观主义→实证主义→问卷调查→统计分析为例。",
    concepts: [
      { bold: "四层层级\", text: \"方法（How）→方法论（Why）→理论视角（哲学立场）→认识论（什么是知识）" },
      { bold: "本体论位置\", text: \"Crotty认为本体论不必单独提出，其他学者的\"本体论立场\"等价于他的\"理论视角\"" },
      { bold: "认识论三类\", text: \"客观主义、建构主义、主观主义" },
      { bold: "层级方向\", text: \"双向箭头：从实践问题溯源到认识论；也可从世界观演绎至方法选择" },
      { bold: "qual/quant大分裂\", text: \"错误在于把\"方法论差异\"当成\"世界观分裂\"——分歧在认识论/理论层面，不在是否用统计" }
    ],
    questions: [
      "箭头方向如何处理？左→右（实践驱动）还是右→左（理论演绎）？",
      "方法论的独特性：垂直整合 vs 水平维度？"
    ],
    note: "建立研究的'坐标位置'的入门框架，整个课程的元地图。"
  },
  {
    author: "Smith, L. T.",
    year: "2012",
    title: "Decolonizing Methodologies: Research and Indigenous Peoples [Introduction]",
    themes: ["indigenous", "method"],
    summary: "从被殖民者的视角出发，揭示研究与帝国主义/殖民历史的纠缠。研究作为知识抢夺的机制：欲望→提取→宣称所有权。知识被挪用、话语被代表、最终土地/权利/语言/生活方式被否定。",
    concepts: [
      { bold: "研究即伤疤\", text: \"与帝国主义缠绕：'用短暂接触代表整体'——学术傲慢与概括的暴力" },
      { bold: "东方主义框架\", text: \"萨义德视角：西方话语建构'他者'，学术机构/话语/治理共同运作" },
      { bold: "反掠夺研究\", text: \"需问：谁的研究？谁拥有？谁受益？谁设计/执行/书写？如何传播？" },
      { bold: "范式规训\", text: \"学科范式如何规训研究；原住民研究者内部规则有时也倾向选非原住民研究者" },
      { bold: "从解构到行动\", text: \"仅仅探索解构和历史不能改变现实；研究必须从批判转向更深的行动路径" }
    ],
    questions: [
      "如何识别研究实践中隐藏的殖民逻辑？",
      "原住民社区内部的'不可见标准'是什么？",
      "研究者如何在谦逊与有效行动之间找到平衡？"
    ]
  },
  {
    author: "Wilson, S.",
    year: "2008",
    title: "Research is Ceremony [Ch. 1+2]",
    themes: ["indigenous", "method"],
    summary: "提出'研究即关系实践'（research is the practice of relationship）。将研究范式解构为本体论→认识论→公理论→方法论四层，强调原住民研究范式不是'添加'，而是需从其自身出发。",
    concepts: [
      { bold: "关系性\", text: \"要理解我的研究，必须更深入理解我这个研究者——研究者与研究不可分割" },
      { bold: "四层范式\", text: \"不同于主流四范式，原住民范式的本体论/认识论/公理论/方法论是有机整体" },
      { bold: "工具与范式不可分离\", text: \"方法论工具与其底层信念相连，不能'借用'工具而抛弃范式前提" },
      { bold: "关系性问责\", text: \"研究写作中需要'关系性问责'——对研究者-概念-社区关系的显性化" },
      { bold: "知识归属\", text: \"主流范式：知识属于个人；原住民范式：知识属于'宇宙/关系网络'，研究者只是诠释者" },
      { bold: "范式内比较\", text: \"跨文化比较应在各自范式内寻找可比性，而非外部同化" }
    ],
    questions: [
      "本质化范式的风险：如何求同而非求一？",
      "从'关系性问责'到大学伦理/数据治理/作者规范，需要什么制度框架？",
      "如何在不妥协的情况下获得主流资源与空间？"
    ]
  },
  {
    author: "Lincoln, Lynham & Guba",
    year: "2011",
    title: "Paradigmatic controversies, contradictions, and emerging confluences",
    themes: ["method"],

  method: "方法论框架",
  indigenous: "原住民方法论",
  positivism: "实证主义",
  phenomenology: "现象学",
  constructionism: "社会建构主义",
  critical: "批判理论",
  feminist: "女性主义",
  crt: "批判种族理论",
  queer: "酷儿理论",
  poststructural: "后结构主义",
  materialism: "新唯物主义",
  tourism: "旅游/去殖民",
  leisure: "休闲研究",
  neuro: "神经科学"

const grid = document.getElementById('grid');
const searchInput = document.getElementById('search-input');
const pills = document.querySelectorAll('.pill');
const resultsText = document.getElementById('results-text');
const totalCount = document.getElementById('total-count');
totalCount.textContent = readings.length;

let activeTheme = 'all';
let searchQuery = '';

function render() {
  const query = searchQuery.toLowerCase().trim();
  
  const filtered = readings.filter(r => {
    const matchTheme = activeTheme === 'all' || r.themes.includes(activeTheme);
    if (!matchTheme) return false;
    if (!query) return true;
    
    const searchable = [
      r.author, r.year, r.title, r.summary,
      r.note || '',
      (r.concepts || []).map(c => c.bold + ' ' + c.text).join(' '),
      (r.questions || []).join(' '),
      r.themes.map(t => themeMap[t] || t).join(' ')
    ].join(' ').toLowerCase();
    
    return query.split(' ').every(word => searchable.includes(word));
  });

  resultsText.textContent = query || activeTheme !== 'all'
    ? `找到 ${filtered.length} 条结果`
    : `共 ${readings.length} 篇阅读`;

  grid.innerHTML = '';

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">◎</div><p>未找到匹配结果</p></div>';
    return;
  }

  filtered.forEach((r, i) => {
    const mainTheme = r.themes[0];
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${i * 0.04}s`;

    const tagsHtml = r.themes.map(t =>
      `<span class="tag tag-${t}">${themeMap[t] || t}</span>`
    ).join('');

    const conceptsHtml = r.concepts ? r.concepts.map(c =>
      `<li><strong>${c.bold}</strong>：${c.text}</li>`
    ).join('') : '';

    const questionsHtml = r.questions ? r.questions.map(q =>
      `<li>？${q}</li>`
    ).join('') : '';

    const noteHtml = r.note
      ? `<div><div class="detail-section-label">◆ 个人笔记</div><div class="personal-note">${r.note}</div></div>`
      : '';

    card.innerHTML = `
      <div class="card-accent theme-${mainTheme}"></div>
      <div class="card-body">
        <div class="card-header">
          <div class="card-author">${r.author}</div>
          <div class="card-year">${r.year}</div>
          <div class="card-title">${r.title}</div>
        </div>
        <div class="card-tags">${tagsHtml}</div>
        <div class="card-summary">${r.summary}</div>
      </div>
      <div class="card-detail">
        ${conceptsHtml ? `<div class="detail-divider"></div><div><div class="detail-section-label">◆ 核心概念</div><ul class="concept-list">${conceptsHtml}</ul></div>` : ''}
        ${questionsHtml ? `<div><div class="detail-section-label">◆ 批判性问题</div><ul class="question-list">${questionsHtml}</ul></div>` : ''}
        ${noteHtml}
      </div>
      <div class="card-toggle">
        <span>展开详情</span>
        <span class="toggle-arrow">▼</span>
      </div>
    `;

    card.querySelector('.card-toggle').addEventListener('click', (e) => {
      e.stopPropagation();
      card.classList.toggle('open');
      const label = card.querySelector('.card-toggle span');
      label.textContent = card.classList.contains('open') ? '收起' : '展开详情';
    });

    grid.appendChild(card);
  });
}

pills.forEach(pill => {
  pill.addEventListener('click', () => {
    pills.forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    activeTheme = pill.dataset.theme;
    render();
  });
});

searchInput.addEventListener('input', (e) => {
  searchQuery = e.target.value;
  render();
});

render();
</script>
